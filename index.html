<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1e2126">
<link rel="manifest" href="manifest.webmanifest">
<title>簡易CAD — 2D 繪圖</title>
<style>
:root{
  --bg:#1e2126; --panel:#262a31; --panel2:#2d323b; --border:#3a4048;
  --fg:#d8dde4; --dim:#8a939e; --acc:#4da3ff; --accdark:#2b6cb0; --danger:#e06060;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; overflow:hidden;}
body{font-family:"Microsoft JhengHei","Segoe UI",sans-serif; background:var(--bg); color:var(--fg); font-size:13px;}
#app{display:flex; flex-direction:column; height:100%;}

/* ── 上方工具列 ── */
#topbar{display:flex; align-items:center; gap:4px; padding:6px 8px; background:var(--panel); border-bottom:1px solid var(--border); flex-wrap:wrap;}
#topbar .title{font-weight:bold; margin-right:10px; color:var(--acc);}
button{background:var(--panel2); color:var(--fg); border:1px solid var(--border); border-radius:4px; padding:5px 10px; cursor:pointer; font-size:13px; font-family:inherit;}
button:hover{background:#3a414c;}
button.primary{background:var(--accdark); border-color:var(--acc);}
button.primary:hover{background:#3182ce;}
.sep{width:1px; height:22px; background:var(--border); margin:0 6px;}

/* ── 主區 ── */
#main{display:flex; flex:1; min-height:0;}
#toolbox{width:92px; background:var(--panel); border-right:1px solid var(--border); padding:6px; display:flex; flex-direction:column; gap:4px; overflow-y:auto;}
#toolbox button{width:100%; text-align:left; padding:7px 8px;}
#toolbox button.active{background:var(--accdark); border-color:var(--acc); color:#fff;}
#toolbox .grp{color:var(--dim); font-size:11px; margin-top:6px;}

#canvasWrap{flex:1; position:relative; min-width:0;}
#cv{position:absolute; inset:0; width:100%; height:100%; display:block; cursor:crosshair; touch-action:none;}
#touchBar{position:absolute; left:50%; transform:translateX(-50%); bottom:14px; display:none; gap:8px; z-index:15;}
#touchBar button{padding:10px 16px; font-size:15px; border-radius:8px; background:#2b6cb0ee; border-color:var(--acc); color:#fff;}
#selBar{position:absolute; left:50%; transform:translateX(-50%); bottom:14px; display:none; gap:8px; z-index:15;}
#selBar button{padding:10px 18px; font-size:17px; border-radius:8px; background:#2d323bee; border-color:var(--border); color:#fff;}
.mobile-only{display:none;}
#floatIn{position:absolute; display:none; z-index:20; width:150px; padding:4px 6px; background:#fff; color:#000; border:2px solid var(--acc); border-radius:3px; font-size:14px; font-family:inherit;}

#side{width:230px; background:var(--panel); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto;}
#side h3{font-size:12px; color:var(--dim); padding:8px 10px 4px; text-transform:uppercase;}
#layerList{padding:0 8px;}
.layerRow{display:flex; align-items:center; gap:5px; padding:4px 5px; border-radius:4px; cursor:pointer;}
.layerRow.current{background:var(--panel2); outline:1px solid var(--acc);}
.layerRow input[type=color]{width:22px; height:20px; border:none; background:none; padding:0; cursor:pointer;}
.layerRow .lname{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.layerRow .icon{cursor:pointer; opacity:.85; user-select:none;}
.layerRow .icon.off{opacity:.3;}
#side .box{padding:4px 10px 10px;}
#side label{display:flex; align-items:center; gap:6px; margin:4px 0; color:var(--dim);}
#side input[type=number]{width:70px; background:var(--panel2); border:1px solid var(--border); color:var(--fg); padding:3px 5px; border-radius:3px;}
#side input[type=checkbox]{accent-color:var(--acc);}
#selInfo{padding:4px 10px; color:var(--dim); font-size:12px; line-height:1.6;}
#selInfo select{background:var(--panel2); border:1px solid var(--border); color:var(--fg); padding:2px 4px; border-radius:3px;}
#selInfo .pfgrid{display:grid; grid-template-columns:1fr 1fr; gap:4px; margin-top:4px;}
#selInfo .pf{display:flex; flex-direction:column; gap:2px; color:var(--dim);}
#selInfo .pf input{background:var(--panel2); border:1px solid var(--border); color:var(--fg); padding:3px 4px; border-radius:3px; width:100%;}

/* ── 狀態列 ── */
#status{display:flex; gap:16px; padding:4px 10px; background:var(--panel); border-top:1px solid var(--border); color:var(--dim); font-size:12px;}
#hint{color:var(--acc);}
#coords{margin-left:auto; font-variant-numeric:tabular-nums;}

/* ── 提示訊息 ── */
#toast{position:fixed; bottom:44px; left:50%; transform:translateX(-50%); background:#111a; color:#fff; padding:8px 18px; border-radius:6px; display:none; z-index:100; max-width:70%;}

/* ── 列印/匯出 PDF 視窗 ── */
#printModal{position:fixed; inset:0; background:#000a; display:none; z-index:50; align-items:center; justify-content:center;}
#printModal .dlg{background:var(--panel); border:1px solid var(--border); border-radius:8px; width:min(880px,94vw); max-height:92vh; display:flex; flex-direction:column;}
#printModal .dlgHead{display:flex; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border); font-weight:bold;}
#printModal .dlgHead button{margin-left:auto;}
#printModal .dlgBody{display:flex; gap:12px; padding:12px; min-height:0; flex:1;}
#printOpts{width:240px; display:flex; flex-direction:column; gap:8px;}
#printOpts label{display:flex; flex-direction:column; gap:3px; color:var(--dim); font-size:12px;}
#printOpts select,#printOpts input[type=text]{background:var(--panel2); border:1px solid var(--border); color:var(--fg); padding:5px; border-radius:4px; font-family:inherit;}
#printOpts .chk{flex-direction:row; align-items:center;}
#previewWrap{flex:1; background:#555; border-radius:4px; display:flex; align-items:center; justify-content:center; overflow:auto; padding:12px;}
#previewWrap svg{background:#fff; box-shadow:0 2px 14px #0008;}

/* ── 手機/窄螢幕 ── */
@media (max-width: 820px){
  .mobile-only{display:inline-block;}
  .desktop-only{display:none !important;}
  #topbar{padding:4px;}
  #topbar button{padding:7px 9px;}
  #main{flex-direction:column;}
  #canvasWrap{order:1;}
  #toolbox{order:2; width:100%; flex-direction:row; overflow-x:auto; overflow-y:hidden;
    border-right:none; border-top:1px solid var(--border); padding:4px; gap:4px;}
  #toolbox .grp{display:none;}
  #toolbox button{flex:0 0 auto; width:auto; padding:9px 10px; font-size:14px;}
  #side{position:fixed; right:0; top:0; bottom:0; width:min(78vw,290px); z-index:45;
    transform:translateX(100%); transition:transform .18s; box-shadow:-6px 0 16px #000a;}
  #side.open{transform:none;}
  #status{font-size:11px; gap:8px;}
  #printModal .dlg{max-height:96vh; width:96vw;}
  #printModal .dlgBody{flex-direction:column; overflow-y:auto;}
  #printOpts{width:100%;}
  #previewWrap{min-height:220px;}
}

/* ── 我的圖面 ── */
#filesModal{position:fixed; inset:0; background:#000a; display:none; z-index:55; align-items:center; justify-content:center;}
#filesModal .dlg{background:var(--panel); border:1px solid var(--border); border-radius:8px; width:min(560px,94vw); max-height:80vh; display:flex; flex-direction:column;}
#filesModal .dlgHead{display:flex; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border); font-weight:bold;}
#filesModal .dlgHead button{margin-left:auto;}
#filesModal .dlgBody{display:flex; gap:10px; padding:12px; min-height:0; flex:1;}
.fmRow{display:flex; align-items:center; gap:8px; padding:8px 6px; border-bottom:1px solid var(--border);}
.fmRow .nm{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.fmRow .meta{color:var(--dim); font-size:11px;}

/* ── 實際列印 ── */
#printArea{display:none;}
@media print{
  body>#app,#printModal,#toast{display:none !important;}
  html,body{overflow:visible; background:#fff;}
  #printArea{display:block !important;}
  #printArea svg{display:block;}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="title">簡易CAD</span>
    <button id="btnNew">新增</button>
    <button id="btnOpen">開啟</button>
    <button id="btnSave">儲存</button>
    <button id="btnFiles">圖面</button>
    <span class="sep"></span>
    <button id="btnUndo">↩ 復原</button>
    <button id="btnRedo">↪ 重做</button>
    <span class="sep"></span>
    <button id="btnZoomExt">縮放全圖</button>
    <span class="sep"></span>
    <button id="btnPdf" class="primary">匯出 PDF</button>
    <button id="btnSvg" class="desktop-only">SVG</button>
    <button id="btnPng" class="desktop-only">PNG</button>
    <button id="btnDxf">DXF</button>
    <button id="btnPanel" class="mobile-only">☰ 圖層</button>
    <input type="file" id="fileIn" accept=".json,.dxf,.dwg" style="display:none">
  </div>
  <div id="main">
    <div id="toolbox">
      <div class="grp">工具</div>
      <button data-tool="select">▣ 選取</button>
      <button data-tool="line">╱ 線段 L</button>
      <button data-tool="rect">▭ 矩形 R</button>
      <button data-tool="circle">◯ 圓 C</button>
      <button data-tool="arc">◠ 圓弧 A</button>
      <button data-tool="poly">⌒ 折線 P</button>
      <button data-tool="text">A 文字 T</button>
      <button data-tool="dim">⟷ 線性標註 D</button>
      <button data-tool="dimrad">⌀ 半徑標註</button>
      <button data-tool="dimang">∠ 角度標註</button>
      <button data-tool="measure">📏 量測 M</button>
      <div class="grp">編輯</div>
      <button id="btnDup">⧉ 複製</button>
      <button id="btnDel">✕ 刪除</button>
      <button data-tool="rotate">⟳ 旋轉</button>
      <button data-tool="mirror">◀▶ 鏡射</button>
      <button data-tool="offset">⇉ 偏移</button>
      <button data-tool="trim">✂ 修剪</button>
      <button data-tool="extend">⇥ 延伸</button>
      <button id="btnArray">▦ 陣列</button>
      <div class="grp">圖庫</div>
      <button id="btnLib">＋ 設備符號</button>
    </div>
    <div id="canvasWrap">
      <canvas id="cv"></canvas>
      <input id="floatIn" autocomplete="off">
      <div id="touchBar">
        <button id="tbLen">⌨ 長度</button>
        <button id="tbDone">✓ 完成</button>
        <button id="tbCancel">✕ 取消</button>
      </div>
      <div id="selBar">
        <button id="sbDup">⧉</button>
        <button id="sbRot">⟳</button>
        <button id="sbMir">◀▶</button>
        <button id="sbDel">✕</button>
      </div>
    </div>
    <div id="side">
      <h3>圖層 <button id="btnAddLayer" style="float:right;padding:1px 8px;margin-right:8px">＋</button></h3>
      <div id="layerList"></div>
      <h3>輔助</h3>
      <div class="box">
        <label><input type="checkbox" id="chkGrid" checked> 顯示格點</label>
        <label><input type="checkbox" id="chkSnapGrid" checked> 格點鎖點</label>
        <label><input type="checkbox" id="chkOsnap" checked> 物件鎖點</label>
        <label><input type="checkbox" id="chkOrtho"> 正交 (Shift)</label>
        <label><input type="checkbox" id="chkCross" checked> 十字游標</label>
      </div>
      <div id="offsetBox" class="box" style="display:none">
        <label>偏移距離 <input type="number" id="inOffset" value="100" min="0" step="10"> mm</label>
      </div>
      <h3>文字/標註</h3>
      <div class="box">
        <label>文字高度 <input type="number" id="inTextH" min="0.1" step="0.5"> mm</label>
        <label>標註字高 <input type="number" id="inDimH" min="0.1" step="0.5"> mm</label>
        <button id="btnAutoH" style="margin-top:4px">依圖面自動調整字高</button>
      </div>
      <h3>選取資訊</h3>
      <div id="selInfo">未選取</div>
    </div>
  </div>
  <div id="status">
    <span id="hint">選取:點選或框選物件</span>
    <span id="coords">0.0, 0.0</span>
  </div>
</div>

<div id="toast"></div>

<div id="printModal">
  <div class="dlg">
    <div class="dlgHead">匯出 PDF / 列印 <button id="btnClosePrint">✕ 關閉</button></div>
    <div class="dlgBody">
      <div id="printOpts">
        <label>紙張
          <select id="pPaper"><option value="A4">A4 (210×297)</option><option value="A3">A3 (297×420)</option></select>
        </label>
        <label>方向
          <select id="pOrient"><option value="landscape">橫向</option><option value="portrait">直向</option></select>
        </label>
        <label>比例
          <select id="pScale">
            <option value="fit">符合頁面</option>
            <option value="1">1:1</option><option value="2">1:2</option><option value="5">1:5</option>
            <option value="10">1:10</option><option value="20">1:20</option><option value="50">1:50</option>
            <option value="100">1:100</option><option value="200">1:200</option>
          </select>
        </label>
        <label>線寬
          <select id="pLineW">
            <option value="0.1">極細 0.1mm</option>
            <option value="0.15" selected>細 0.15mm(建議)</option>
            <option value="0.25">中 0.25mm</option>
            <option value="0.35">粗 0.35mm</option>
          </select>
        </label>
        <label>顏色
          <select id="pColor">
            <option value="color">維持彩色</option>
            <option value="mono">全部黑色</option>
          </select>
        </label>
        <label class="chk"><input type="checkbox" id="pTitle" checked> 標題欄</label>
        <label>圖名 <input type="text" id="pName" value="未命名圖面"></label>
        <div style="color:var(--dim);font-size:12px;line-height:1.5">
          「下載」直接產生 PDF 檔(手機電腦都可);「列印」走印表機(LINE 內建瀏覽器不支援列印)。
        </div>
        <button id="btnDlPdf" class="primary" style="margin-top:auto">⬇ 下載 PDF 檔</button>
        <button id="btnDoPrint">🖨 列印(經印表機)</button>
      </div>
      <div id="previewWrap"></div>
    </div>
  </div>
</div>

<div id="filesModal">
  <div class="dlg">
    <div class="dlgHead">我的圖面(存在此裝置的瀏覽器)<button id="btnCloseFiles">✕ 關閉</button></div>
    <div class="dlgBody" style="flex-direction:column">
      <div style="display:flex; gap:8px">
        <input type="text" id="fmName" placeholder="輸入圖面名稱" style="flex:1; background:var(--panel2); border:1px solid var(--border); color:var(--fg); padding:6px 8px; border-radius:4px">
        <button id="fmSave" class="primary">儲存目前圖面</button>
      </div>
      <div id="fmList" style="flex:1; overflow-y:auto; min-height:120px"></div>
      <div style="color:var(--dim); font-size:12px">超大圖面可能超過瀏覽器容量 — 重要圖請同時用「儲存」下載 .json 檔備份。</div>
    </div>
  </div>
</div>

<div id="printArea"></div>

<script>
"use strict";
/* ============================================================
   簡易CAD — 單檔 2D 繪圖軟體
   座標系:單位 mm,y 向上,原點左下(與 圖面繪製 規約一致)
   ============================================================ */

// ─── 狀態 ───────────────────────────────────────────────
const DEFAULT_DOC = () => ({
  version: 1, units: "mm",
  layers: [{ name: "0", color: "#e8e8e8", visible: true, locked: false }],
  entities: [],
  settings: { textH: 3.5, dimH: 3.5 },
});
let doc = DEFAULT_DOC();
let currentLayer = "0";
let view = { scale: 1, tx: 60, ty: 0 };   // sx = wx*scale+tx ; sy = -wy*scale+ty
let tool = "select";
let pts = [];            // 繪製中已點的世界座標點
let cursorW = { x: 0, y: 0 };  // 目前游標(已鎖點)的世界座標
let cursorS = { x: 0, y: 0 };  // 螢幕座標
let snapMark = null;     // 鎖點標記 {x,y,kind}
let selection = new Set();
let marquee = null;      // 框選 {x1,y1,x2,y2} 螢幕座標
let moveDrag = null;     // 移動中 {lastW}
let panning = null;
let spaceHeld = false;
let idSeq = 1;
let undoStack = [], redoStack = [];

const $ = id => document.getElementById(id);
const cv = $("cv"), ctx = cv.getContext("2d");

// ─── 小工具 ─────────────────────────────────────────────
function uid() { return idSeq++; }
function fmt(v) { return String(parseFloat(v.toFixed(2))); }
function toast(msg, ms = 2200) {
  const t = $("toast"); t.textContent = msg; t.style.display = "block";
  clearTimeout(t._tm); t._tm = setTimeout(() => t.style.display = "none", ms);
}
function w2s(p) { return { x: p.x * view.scale + view.tx, y: -p.y * view.scale + view.ty }; }
function s2w(x, y) { return { x: (x - view.tx) / view.scale, y: (view.ty - y) / view.scale }; }
// ── 大圖效能:文件版本號 + 圖層表/可見清單/空間網格快取 ──
let docRev = 0, lmapCache = null, visCache = null, spatial = null;
function bumpRev() { docRev++; lmapCache = null; visCache = null; spatial = null; }
function layerMap() {
  if (!lmapCache || lmapCache.rev !== docRev)
    lmapCache = { rev: docRev, m: new Map(doc.layers.map(l => [l.name, l])) };
  return lmapCache.m;
}
function layerOf(e) { return layerMap().get(e.layer) || doc.layers[0]; }
function visibleEntities() {
  if (!visCache || visCache.rev !== docRev)
    visCache = { rev: docRev, list: doc.entities.filter(e => layerOf(e).visible) };
  return visCache.list;
}
function editableEntities() { return visibleEntities().filter(e => !layerOf(e).locked); }
function buildSpatial() { // 均勻網格:鎖點/點選只查游標附近
  const list = visibleEntities();
  let b = { minx: 0, miny: 0, maxx: 1, maxy: 1 };
  if (list.length) b = extents(list) || b;
  const cs = Math.max(b.maxx - b.minx, b.maxy - b.miny, 100) / 96;
  const map = new Map(), big = [];
  for (const e of list) {
    const q = bboxCached(e);
    const x0 = Math.floor(q.minx / cs), x1 = Math.floor(q.maxx / cs);
    const y0 = Math.floor(q.miny / cs), y1 = Math.floor(q.maxy / cs);
    if ((x1 - x0 + 1) * (y1 - y0 + 1) > 64) { big.push(e); continue; } // 跨太多格的大物件
    for (let gx = x0; gx <= x1; gx++) for (let gy = y0; gy <= y1; gy++) {
      const k = gx + "," + gy;
      let a = map.get(k); if (!a) map.set(k, a = []);
      a.push(e);
    }
  }
  spatial = { rev: docRev, cs, map, big };
}
function nearEntities(w, tw) { // 游標附近(世界座標 ± tw)的可見物件
  if (!spatial || spatial.rev !== docRev) buildSpatial();
  const cs = spatial.cs, out = [], seen = new Set();
  const x0 = Math.floor((w.x - tw) / cs), x1 = Math.floor((w.x + tw) / cs);
  const y0 = Math.floor((w.y - tw) / cs), y1 = Math.floor((w.y + tw) / cs);
  // 視圖縮很小時 tw(世界單位)可能極大 → 掃描格數爆炸,退回全清單
  if ((x1 - x0 + 1) * (y1 - y0 + 1) > 4096) return visibleEntities();
  for (let gx = x0; gx <= x1; gx++) for (let gy = y0; gy <= y1; gy++) {
    const a = spatial.map.get(gx + "," + gy);
    if (a) for (const e of a) if (!seen.has(e.id)) { seen.add(e.id); out.push(e); }
  }
  for (const e of spatial.big) out.push(e);
  return out;
}

// ─── 復原/重做 ──────────────────────────────────────────
function snapshot() {
  const s = JSON.stringify({ en: doc.entities, ly: doc.layers, cl: currentLayer });
  undoStack.push(s);
  const cap = s.length > 5e6 ? 10 : 100; // 大圖限制快照數,避免吃光記憶體
  while (undoStack.length > cap) undoStack.shift();
  redoStack = [];
}
function restore(s) {
  const o = JSON.parse(s);
  doc.entities = o.en; doc.layers = o.ly; currentLayer = o.cl;
  selection.clear(); bumpRev(); renderLayers(); redraw(true); autosave();
}
function undo() {
  if (!undoStack.length) { toast("沒有可復原的步驟"); return; }
  redoStack.push(JSON.stringify({ en: doc.entities, ly: doc.layers, cl: currentLayer }));
  restore(undoStack.pop());
}
function redo() {
  if (!redoStack.length) { toast("沒有可重做的步驟"); return; }
  undoStack.push(JSON.stringify({ en: doc.entities, ly: doc.layers, cl: currentLayer }));
  restore(redoStack.pop());
}

// ─── 幾何 ───────────────────────────────────────────────
function entPoints(e) { // 物件的特徵點(供鎖點/包圍盒)
  switch (e.type) {
    case "line": return [
      { x: e.x1, y: e.y1, kind: "端點" }, { x: e.x2, y: e.y2, kind: "端點" },
      { x: (e.x1 + e.x2) / 2, y: (e.y1 + e.y2) / 2, kind: "中點" }];
    case "rect": {

// ─── 鎖點 ───────────────────────────────────────────────
function getSnap(mx, my, tolOver, exclude) {
  snapMark = null;
  if ($("chkOsnap").checked) {
    const tol = tolOver || 10; let best = null, bd = tol;
    const w = s2w(mx, my), tw = tol / view.scale; // 世界座標粗篩範圍
    let near = nearEntities(w, tw);
    if (exclude) near = near.filter(e => e !== exclude);
    for (const e of near) {
      const b = bboxCached(e); // 粗篩:游標不在包圍盒附近就跳過(大圖效能關鍵)
      if (w.x < b.minx - tw || w.x > b.maxx + tw || w.y < b.miny - tw || w.y > b.maxy + tw) continue;
      for (const sp of entPoints(e)) {
        const s = w2s(sp), d = Math.hypot(s.x - mx, s.y - my);
        if (d < bd) { bd = d; best = sp; }
      }
    }
    // 交點鎖點:附近兩物件的線段交點(優先度略低於特徵點,故用稍大容差比對)
    if (!best) {
      const segList = [];
      for (const e of near) if (["line", "rect", "poly"].includes(e.type)) for (const s of polySegsAny(e)) segList.push(s);
      for (let i = 0; i < segList.length; i++) for (let j = i + 1; j < segList.length; j++) {
        const ip = intersectSegs(segList[i][0], segList[i][1], segList[j][0], segList[j][1]);
        if (!ip) continue;
        const s = w2s(ip), d = Math.hypot(s.x - mx, s.y - my);
        if (d < bd) { bd = d; best = { x: ip.x, y: ip.y, kind: "交點" }; }
      }
      // 垂足(繪製中,從上一點往目標線作垂線)與最近點(貼著線上任意處)
      const ref = pts.length ? pts[pts.length - 1] : null;
      for (const s of segList) {
        if (ref) {
          const ft = projOnSeg(ref, s[0], s[1]);
          if (ft) {
            const sp = w2s(ft), d = Math.hypot(sp.x - mx, sp.y - my);
            if (d < bd) { bd = d; best = { x: ft.x, y: ft.y, kind: "垂足" }; }
          }
        }
        if (!best) { // 最近點最弱,且用較小容差,避免游標老是黏線
          const np = projOnSeg(w, s[0], s[1]);
          if (np) {
            const sp = w2s(np), d = Math.hypot(sp.x - mx, sp.y - my);
            if (d < tol * 0.6 && d < bd) { bd = d; best = { x: np.x, y: np.y, kind: "最近點" }; }
          }
        }
      }
    }
    if (best) { snapMark = best; return { x: best.x, y: best.y }; }
  }
  if ($("chkSnapGrid").checked) {
    const st = gridStep().minor;
    const w = s2w(mx, my);
    return { x: Math.round(w.x / st) * st, y: Math.round(w.y / st) * st };
  }

}
function applyOrtho(p, ref) {
  if (!ref) return p;
  const on = $("chkOrtho").checked;
  if (!on) return p;
  return Math.abs(p.x - ref.x) > Math.abs(p.y - ref.y) ? { x: p.x, y: ref.y } : { x: ref.x, y: p.y };
}
function gridStep() {
  let minor = 1;
  while (minor * view.scale < 8) minor *= 10;
  while (minor * view.scale > 80) minor /= 10;
  return { minor, major: minor * 10 };
}

function resizeCanvas() {

  redraw(true);
}
function drawGrid(c) {

      const s = w2s({ x, y: 0 }); c.moveTo(s.x, 0); c.lineTo(s.x, cv._h);
    }
    for (let y = Math.floor(w0.y / step) * step; y <= w1.y; y += step) {

    }

  c.moveTo(o.x, 0); c.lineTo(o.x, cv._h); c.moveTo(0, o.y); c.lineTo(cv._w, o.y);
  c.stroke();

function strokeEntity(c, e, vw) { // 以任意 view 畫在任意 context(螢幕/PNG 共用)

    case "line": { const a = W2S({ x: e.x1, y: e.y1 }), b = W2S({ x: e.x2, y: e.y2 }); c.moveTo(a.x, a.y); c.lineTo(b.x, b.y); break; }

function previewEntity(p) {

    case "measure": return { type: "poly", pts: [...pts.map(q => [q.x, q.y]), [p.x, p.y]], closed: pts.length >= 2 };
    case "rect": return { type: "rect", x: Math.min(a.x, p.x), y: Math.min(a.y, p.y), w: Math.abs(p.x - a.x), h: Math.abs(p.y - a.y) };

let autosaveTimer = null, autosaveWarned = false;

function loadAutosave() {

    const l = [0.5, 0.68, 0.42, 0.6, 0.34, 0.52, 0.28, 0.45, 0.22, 0.38][idx];
    const s = idx % 2 ? 0.45 : 0.95;
    const a = s * Math.min(l, 1 - l);

}

          const src = closed ? [...vs, vs[0]] : vs;
          const flat = bulgeChain(src).map(q => ap(M, q[0], q[1]));
          if (closed) flat.pop();
          if (flat.length >= 2) emit({ type: "poly", pts: flat, closed }, ly);
        }
        break;
      }
      case "TEXT": case "ATTRIB": case "ATTDEF": {
        const s = (e.text || "").trim();
        if (s && e.type !== "ATTDEF") {
          const p = P(M, e.startPoint || e.insertionPoint);
          emit({ type: "text", x: p[0], y: p[1], h: (e.textHeight || 3.5) * mSc(M), str: s }, ly);
        }
        break;
      }
      case "MTEXT": {
        const s = mplain(e.text || "").trim();
        if (s) {
          const p = P(M, e.insertionPoint);
          emit({ type: "text", x: p[0], y: p[1], h: (e.textHeight || 3.5) * mSc(M), str: s.slice(0, 200) }, ly);
        }
        break;
      }
      case "ELLIPSE": {
        const mxa = e.majorAxisEndPoint || { x: 1, y: 0 };
        const t1 = e.startAngle || 0, sweep = ((e.endAngle == null ? Math.PI * 2 : e.endAngle) - t1) || Math.PI * 2;
        const n = 64, pts2 = [];
        for (let i = 0; i <= n; i++) {
          const t = t1 + sweep * i / n;
          const x = e.center.x + Math.cos(t) * mxa.x - Math.sin(t) * e.axisRatio * mxa.y;
          const y = e.center.y + Math.cos(t) * mxa.y + Math.sin(t) * e.axisRatio * mxa.x;
          pts2.push(ap(M, x, y));
        }
        emit({ type: "poly", pts: pts2, closed: Math.abs(sweep - Math.PI * 2) < 1e-6 }, ly);
        break;
      }
      case "SPLINE": {
        const src = (e.fitPoints && e.fitPoints.length >= 2) ? e.fitPoints : (e.controlPoints || []);
        const pts2 = src.map(p => ap(M, p.x, p.y));
        if (pts2.length >= 2) emit({ type: "poly", pts: pts2, closed: !!(e.flag & 1) }, ly);
        break;
      }
      case "SOLID": {
        const cs = [e.corner1, e.corner2, e.corner4 || e.corner3, e.corner3].filter(Boolean);
        if (cs.length >= 3) emit({ type: "poly", pts: cs.map(p => P(M, p)), closed: true }, ly);
        break;
      }
      case "INSERT": case "DIMENSION": {
        if (depth >= 8) { skipped++; break; }
        const blk = blocks.get(e.name);
        if (!blk) { skipped++; break; }
        let Mi = M0;
        if (e.type === "INSERT") {
          const base = blk.basePoint || { x: 0, y: 0 };
          const sx = e.xScale || 1, sy = e.yScale || 1, rot = e.rotation || 0; // 弧度
          const co = Math.cos(rot), si = Math.sin(rot);
          const RS = [co * sx, si * sx, -si * sy, co * sy];
          Mi = [RS[0], RS[1], RS[2], RS[3],
            e.insertionPoint.x - (RS[0] * base.x + RS[2] * base.y),
            e.insertionPoint.y - (RS[1] * base.x + RS[3] * base.y)];
        }
        const Mt = mmul(M, Mi);
        const cc = Math.max(1, e.columnCount || 1), rc = Math.max(1, e.rowCount || 1);
        for (let ci = 0; ci < cc; ci++) for (let ri = 0; ri < rc; ri++) {
          const Mo = (ci || ri) ? mmul(Mt, [1, 0, 0, 1, ci * (e.columnSpacing || 0), ri * (e.rowSpacing || 0)]) : Mt;
          for (const ce of (blk.entities || [])) convEnt(ce, Mo, ly, depth + 1);
        }
        for (const at of (e.attribs || [])) convEnt(at, M, ly, depth + 1);
        break;
      }
      default: skipped++;
    }
  }

  const ms = blocks.get("*Model_Space");
  const rootEnts = (ms && ms.entities && ms.entities.length ? ms.entities : db.entities) || [];
  for (const e of rootEnts) convEnt(e, M0, null, 0);

  // 圖層表(顏色可能是 24-bit 或 ACI 索引)
  const layerRows = [];
  for (const l of ((db.tables && db.tables.LAYER && db.tables.LAYER.entries) || [])) {
    let col = "#e8e8e8";
    if (l.color && l.color > 0 && l.color <= 0xffffff && l.color !== 16777215) col = "#" + l.color.toString(16).padStart(6, "0");
    else if (l.colorIndex && l.colorIndex > 0 && l.colorIndex < 256) col = aciHex2(l.colorIndex);
    layerRows.push({ name: l.name, color: col, visible: !l.off && !(l.standardFlag & 1), locked: false });
  }
  const layMap = new Map(layerRows.map(l => [l.name, l]));
  for (const e of out) if (!layMap.has(e.layer)) {
    const l = { name: e.layer, color: "#e8e8e8", visible: true, locked: false };
    layMap.set(e.layer, l); layerRows.push(l);
  }
  if (!layerRows.length) layerRows.push({ name: "0", color: "#e8e8e8", visible: true, locked: false });
  if (out.length >= MAXE) toast(`圖太大,已達 ${MAXE} 圖元上限,後面的被截掉`, 7000);
  return {
    doc: { version: 1, units: "mm", layers: layerRows, entities: out, settings: { textH: 3.5, dimH: 3.5 } },
    skipped,
  };
}

// ─── SVG 匯出(檔案與列印共用) ─────────────────────────
function arcToPolyPts(e) {

    const a = e.a1 + sweep * i / n;

  }

}
function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

    case "rect": case "poly": {
      const src = e.type === "rect"
        ? [[e.x, e.y], [e.x + e.w, e.y], [e.x + e.w, e.y + e.h], [e.x, e.y + e.h]]
        : e.pts;
      const closed = e.type === "rect" || e.closed;
      const d = src.map(q => P(q[0], q[1]).join(",")).join(" ");
      return `<${closed ? "polygon" : "polyline"} points="${d}" ${attr}/>`;
    }
    case "circle": { const c = P(e.cx, e.cy); return `<circle cx="${c[0]}" cy="${c[1]}" r="${e.r}" ${attr}/>`; }
    case "arc": {
      const d = arcToPolyPts(e).map(q => P(q[0], q[1]).join(",")).join(" ");

    }
    case "text": {
      const a = P(e.x, e.y);

    }
    case "dim": {

      for (const t of g.tris) out += `<polygon points="${t.map(q => P(q.x, q.y).join(",")).join(" ")}" fill="${color}"/>`;
      const a = P(g.text.x, g.text.y);
      const deg = -g.text.ang * 180 / Math.PI;
      out += `<text x="${a[0]}" y="${a[1]}" font-size="${g.text.h}" fill="${color}" text-anchor="middle" font-family="Microsoft JhengHei,sans-serif" transform="rotate(${fmt(deg)} ${a[0]} ${a[1]})">${esc(g.text.str)}</text>`;

    }
  }

}
function printLayout(o) { // 列印版面計算(SVG 與點陣預覽共用)
  const b = extents();

  const pad = Math.max((b.maxx - b.minx), (b.maxy - b.miny)) * 0.03 + 2;
  const dw = (b.maxx - b.minx) + pad * 2, dh = (b.maxy - b.miny) + pad * 2;

    scaleN, vbW, vbH, m, titleH, dcy,

function svgString(opts) {

  const dw = (b.maxx - b.minx) + pad * 2, dh = (b.maxy - b.miny) + pad * 2;

  let W, H, vbW, vbH, sw, titleH = 0;

    const scaleN = L.scaleN;

        `<line x1="${fmt(tx1)}" y1="${fmt(ty1 + fh / 2)}" x2="${fmt(tx1 + fw)}" y2="${fmt(ty1 + fh / 2)}" stroke="#000" stroke-width="${sw * 0.7}"/>` +
        `<text x="${fmt(tx1 + 2 * scaleN)}" y="${fmt(ty1 + fh * 0.38)}" font-size="${fmt(fs)}" font-family="Microsoft JhengHei,sans-serif">圖名:${esc(o.name || "")}</text>` +
        `<text x="${fmt(tx1 + 2 * scaleN)}" y="${fmt(ty1 + fh * 0.88)}" font-size="${fmt(fs)}" font-family="Microsoft JhengHei,sans-serif">比例 ${o.scaleN ? "1:" + o.scaleN : "符合頁面"}  單位 mm  ${o.date || ""}</text></g>`;
    }

  const els2 = visibleEntities().map(e => svgEntity(e, tf, printColor(layerOf(e).color), sw));
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${fmt(dw)}mm" height="${fmt(dh)}mm" viewBox="0 0 ${fmt(dw)} ${fmt(dh)}">` +

}
function printColor(c, mono) { // 白紙上的印色:mono=全黑;否則淺色轉深、其餘保留

  return lum > 190 ? "#000000" : c;

// ─── DXF R12 匯出 ───────────────────────────────────────
function aciColor(hex) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  const basic = [[255, 0, 0, 1], [255, 255, 0, 2], [0, 255, 0, 3], [0, 255, 255, 4], [0, 0, 255, 5], [255, 0, 255, 6], [255, 255, 255, 7]];
  let best = 7, bd = Infinity;
  for (const [br, bg, bb, i] of basic) {
    const d = (r - br) ** 2 + (g - bg) ** 2 + (b - bb) ** 2;
    if (d < bd) { bd = d; best = i; }
  }
  return best;
}
function dxfEsc(s) { // R12 無法存 UTF-8:非 ASCII 轉 AutoCAD \U+XXXX 跳脫(ezdxf.decode_dxf_unicode 可還原)
  return String(s).replace(/[^\x20-\x7E]/g, ch => "\\U+" + ch.charCodeAt(0).toString(16).toUpperCase().padStart(4, "0"));
}
function dxfString() {
  const L = [];
  const G = (c, v) => { L.push(String(c), String(v)); };
  const deg = a => (norm2pi(a) * 180 / Math.PI);
  G(0, "SECTION"); G(2, "HEADER");
  G(9, "$ACADVER"); G(1, "AC1009");
  G(9, "$INSUNITS"); G(70, 4); // mm
  G(0, "ENDSEC");
  G(0, "SECTION"); G(2, "TABLES");
  G(0, "TABLE"); G(2, "LAYER"); G(70, doc.layers.length);
  for (const l of doc.layers) {
    G(0, "LAYER"); G(2, dxfEsc(l.name)); G(70, 0); G(62, aciColor(l.color)); G(6, "CONTINUOUS");
  }
  G(0, "ENDTAB"); G(0, "ENDSEC");
  G(0, "SECTION"); G(2, "ENTITIES");
  const line = (x1, y1, x2, y2, ly) => { G(0, "LINE"); G(8, ly); G(10, fmt(x1)); G(20, fmt(y1)); G(11, fmt(x2)); G(21, fmt(y2)); };
  const text = (x, y, h, str, ly, ang) => {
    G(0, "TEXT"); G(8, ly); G(10, fmt(x)); G(20, fmt(y)); G(40, fmt(h)); G(1, dxfEsc(str));
    if (ang) G(50, fmt(ang));
  };
  for (const e of doc.entities) {
    const ly = dxfEsc(e.layer);
    switch (e.type) {
      case "line": line(e.x1, e.y1, e.x2, e.y2, ly); break;
      case "circle": G(0, "CIRCLE"); G(8, ly); G(10, fmt(e.cx)); G(20, fmt(e.cy)); G(40, fmt(e.r)); break;
      case "arc": G(0, "ARC"); G(8, ly); G(10, fmt(e.cx)); G(20, fmt(e.cy)); G(40, fmt(e.r)); G(50, fmt(deg(e.a1))); G(51, fmt(deg(e.a2))); break;
      case "rect": case "poly": {
        const src = e.type === "rect"
          ? [[e.x, e.y], [e.x + e.w, e.y], [e.x + e.w, e.y + e.h], [e.x, e.y + e.h]]
          : e.pts;
        const closed = e.type === "rect" || e.closed;
        G(0, "POLYLINE"); G(8, ly); G(66, 1); G(70, closed ? 1 : 0);
        for (const q of src) { G(0, "VERTEX"); G(8, ly); G(10, fmt(q[0])); G(20, fmt(q[1])); }
        G(0, "SEQEND");
        break;
      }
      case "text": text(e.x, e.y, e.h, e.str, ly); break;
      case "dim": { // 分解為線+箭頭(線)+文字
        const g = dimPrimitives(e);
        for (const s of g.lines) line(s[0].x, s[0].y, s[1].x, s[1].y, ly);
        for (const t of g.tris) {
          line(t[0].x, t[0].y, t[1].x, t[1].y, ly);
          line(t[1].x, t[1].y, t[2].x, t[2].y, ly);
          line(t[2].x, t[2].y, t[0].x, t[0].y, ly);
        }
        const halfW = g.text.str.length * g.text.h * 0.35;
        text(g.text.x - halfW * Math.cos(g.text.ang), g.text.y - halfW * Math.sin(g.text.ang),
          g.text.h, g.text.str, ly, g.text.ang * 180 / Math.PI);
        break;
      }
    }
  }
  G(0, "ENDSEC"); G(0, "EOF");
  return L.join("\r\n") + "\r\n";
}

// ─── PNG 匯出 ───────────────────────────────────────────
function exportPng() {
  const b = extents();
  if (!b) { toast("沒有圖形可匯出"); return; }
  const pad = Math.max(b.maxx - b.minx, b.maxy - b.miny) * 0.04 + 2;
  const dw = b.maxx - b.minx + pad * 2, dh = b.maxy - b.miny + pad * 2;
  const long = 2400;
  const sc = long / Math.max(dw, dh);
  const c2 = document.createElement("canvas");
  c2.width = Math.round(dw * sc); c2.height = Math.round(dh * sc);
  const cx2 = c2.getContext("2d");
  cx2.fillStyle = "#ffffff"; cx2.fillRect(0, 0, c2.width, c2.height);
  const vw = { scale: sc, tx: -(b.minx - pad) * sc, ty: (b.maxy + pad) * sc };
  cx2.lineWidth = Math.max(1.2, sc * 0.35);
  for (const e of visibleEntities()) {
    const col = printColor(layerOf(e).color);
    cx2.strokeStyle = col; cx2.fillStyle = col;
    strokeEntity(cx2, e, vw);
  }
  c2.toBlob(bl => download(`圖面-${stamp()}.png`, bl), "image/png");
  toast("已下載 PNG");
}

// ─── 列印 / PDF ─────────────────────────────────────────
const PAPERS = { A4: [210, 297], A3: [297, 420] };
function printOpts() {
  const [pw, ph] = PAPERS[$("pPaper").value];
  const land = $("pOrient").value === "landscape";
  const sv = $("pScale").value;
  const d = new Date();
  return {
    forPrint: true,
    paperW: land ? Math.max(pw, ph) : Math.min(pw, ph),
    paperH: land ? Math.min(pw, ph) : Math.max(pw, ph),
    margin: 10,
    scaleN: sv === "fit" ? null : parseFloat(sv),
    lineW: parseFloat($("pLineW").value) || 0.15,   // 紙上線寬 mm
    mono: $("pColor").value === "mono",              // 全部黑色
    title: $("pTitle").checked,
    name: $("pName").value,
    date: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`,
  };
}
const RASTER_PREVIEW_LIMIT = 30000; // 圖元超過此數,預覽改用點陣圖(向量預覽會凍結十幾秒)
function rasterPreview(o) {
  const L = printLayout(o);
  if (!L) return null;
  const wrap = $("previewWrap");
  const k = Math.min((wrap.clientWidth - 24) / o.paperW, (wrap.clientHeight - 24) / o.paperH, 3);
  const res = Math.min(2, 1600 / Math.max(o.paperW, o.paperH)) * 2; // 畫布解析度(px / 紙mm)
  const c = document.createElement("canvas");
  c.width = Math.round(o.paperW * res); c.height = Math.round(o.paperH * res);
  c.style.width = (o.paperW * k) + "px"; c.style.height = (o.paperH * k) + "px";
  c.style.background = "#fff"; c.style.boxShadow = "0 2px 14px #0008";
  c.title = "預覽為簡化點陣圖;實際列印輸出仍是向量(含標題欄)";
  const x = c.getContext("2d");
  x.fillStyle = "#fff"; x.fillRect(0, 0, c.width, c.height);
  const vs = res / L.scaleN; // px / 世界mm
  const vw = { scale: vs, tx: -L.vbX * vs, ty: (L.vbY + L.vbH) * vs };
  x.lineWidth = Math.max(0.5, (o.lineW || 0.15) * res);
  for (const e of visibleEntities()) {
    const col = printColor(layerOf(e).color, o.mono);
    x.strokeStyle = col; x.fillStyle = col;
    strokeEntity(x, e, vw);
  }
  return c;
}
function refreshPreview() {
  const o = printOpts();
  const wrap = $("previewWrap");
  if (!visibleEntities().length) { wrap.innerHTML = "<div style='color:#ddd'>沒有圖形</div>"; return; }
  wrap.innerHTML = "<div style='color:#ddd'>產生預覽中…</div>";
  clearTimeout(refreshPreview._tm);
  refreshPreview._tm = setTimeout(() => {
    if (visibleEntities().length > RASTER_PREVIEW_LIMIT) {
      const c = rasterPreview(o);
      wrap.innerHTML = "";
      if (c) wrap.appendChild(c);
      return;
    }
    const s = svgString(o);
    if (!s) { wrap.innerHTML = "<div style='color:#ddd'>沒有圖形</div>"; return; }
    wrap.innerHTML = s;
    const svg = wrap.firstElementChild;
    // 預覽縮小顯示
    const maxW = wrap.clientWidth - 24, maxH = wrap.clientHeight - 24;
    const k = Math.min(maxW / o.paperW, maxH / o.paperH, 3);
    svg.setAttribute("width", (o.paperW * k) + "px");
    svg.setAttribute("height", (o.paperH * k) + "px");
  }, 40);
}
// ─── 自製 PDF 產生器:向量幾何 + 中文文字點陣貼片,直接下載,不經列印對話框 ───
const MM2PT = 72 / 25.4;
async function deflateBytes(u8) { // FlateDecode = zlib(CompressionStream 'deflate' 正是 zlib 包裝)
  const st = new Blob([u8]).stream().pipeThrough(new CompressionStream("deflate"));
  return new Uint8Array(await new Response(st).arrayBuffer());
}
async function buildPdfBlob(o) {
  const L = printLayout(o);
  if (!L) return null;
  const Wpt = o.paperW * MM2PT, Hpt = o.paperH * MM2PT;
  const k = MM2PT / L.scaleN;                    // 世界 mm → pt(PDF 與本軟體同為 y 向上,免翻轉)
  const X = wx => (wx - L.vbX) * k, Y = wy => (wy - L.vbY) * k;
  const f2 = v => String(Math.round(v * 100) / 100);
  const hex2rgb = h => [parseInt(h.slice(1, 3), 16) / 255, parseInt(h.slice(3, 5), 16) / 255, parseInt(h.slice(5, 7), 16) / 255].map(v => f2(v)).join(" ");
  const ops = ["q", `0 0 ${f2(Wpt)} ${f2(Hpt)} re W n`, `${f2((o.lineW || 0.15) * MM2PT)} w`, "1 J 1 j"];

  // 文字貼片:同字串+字高+顏色共用一張圖(XObject),不同位置重複引用
  const patches = new Map(); let patchSeq = 0;
  const placements = [];
  function addText(str, hWorld, wx, wy, col, ang, centered) {
    const hPaperMM = hWorld / L.scaleN;
    if (hPaperMM < 0.5) return;                 // 紙上小於 0.5mm 的字,印了也看不見
    const key = str + "|" + hPaperMM.toFixed(2) + "|" + col;
    let p = patches.get(key);
    if (!p) {
      if (patches.size >= 4000) return;         // 上限保護
      const fontPx = Math.max(8, Math.min(160, hPaperMM * 8));
      const c = document.createElement("canvas");
      let x2 = c.getContext("2d");
      x2.font = `${fontPx}px "Microsoft JhengHei",sans-serif`;
      c.width = Math.max(2, Math.ceil(x2.measureText(str).width) + 2);
      c.height = Math.ceil(fontPx * 1.35);
      x2 = c.getContext("2d");
      x2.font = `${fontPx}px "Microsoft JhengHei",sans-serif`;
      x2.fillStyle = col;
      x2.fillText(str, 1, fontPx);
      const img = x2.getImageData(0, 0, c.width, c.height).data;
      const rgb = new Uint8Array(c.width * c.height * 3), al = new Uint8Array(c.width * c.height);
      for (let i = 0, j = 0; i < img.length; i += 4, j += 3) {
        rgb[j] = img[i]; rgb[j + 1] = img[i + 1]; rgb[j + 2] = img[i + 2]; al[i / 4] = img[i + 3];
      }
      p = { name: "Im" + (++patchSeq), w: c.width, h: c.height, fontPx, rgb, al };
      patches.set(key, p);
    }
    const ptPerPx = (hWorld / L.scaleN) * MM2PT / p.fontPx;
    const wPt = p.w * ptPerPx, hPt = p.h * ptPerPx;
    const dx = centered ? -wPt / 2 : -1 * ptPerPx;
    const dy = -(p.h - p.fontPx) * ptPerPx;     // 影像底 = 基線下方(容納字尾)
    let M = [1, 0, 0, 1, X(wx), Y(wy)];
    if (ang) M = mmul(M, [Math.cos(ang), Math.sin(ang), -Math.sin(ang), Math.cos(ang), 0, 0]);
    M = mmul(M, [wPt, 0, 0, hPt, dx, dy]);
    placements.push(`q ${M.map(f2).join(" ")} cm /${p.name} Do Q`);
  }
  const polyOp = (pts, closed, col, fill) => {
    if (pts.length < 2) return;
    let s = `${hex2rgb(col)} ${fill ? "rg" : "RG"} ${f2(X(pts[0][0]))} ${f2(Y(pts[0][1]))} m `;
    for (let i = 1; i < pts.length; i++) s += `${f2(X(pts[i][0]))} ${f2(Y(pts[i][1]))} l `;
    ops.push(s + (fill ? "f" : (closed ? "s" : "S")));
  };
  for (const e of visibleEntities()) {
    const col = printColor(layerOf(e).color, o.mono);
    const mixW = h => "#" + [1, 3, 5].map(i => Math.round(parseInt(h.slice(i, i + 2), 16) * 0.22 + 255 * 0.78).toString(16).padStart(2, "0")).join(""); // 混白近似半透明填色
    switch (e.type) {
      case "line": polyOp([[e.x1, e.y1], [e.x2, e.y2]], false, col); break;
      case "rect": {
        const rp = [[e.x, e.y], [e.x + e.w, e.y], [e.x + e.w, e.y + e.h], [e.x, e.y + e.h]];
        if (e.fill) polyOp(rp, true, mixW(col), true);
        polyOp(rp, true, col); break;
      }
      case "poly":
        if (e.fill && e.closed) polyOp(e.pts, true, mixW(col), true);
        polyOp(e.pts, e.closed, col); break;
      case "circle": {
        const cp = tessArcPts(e.cx, e.cy, e.r, 0, Math.PI * 2);
        if (e.fill) polyOp(cp, true, mixW(col), true);
        polyOp(cp, true, col); break;
      }
      case "arc": polyOp(tessArcPts(e.cx, e.cy, e.r, e.a1, norm2pi(e.a2 - e.a1) || Math.PI * 2), false, col); break;
      case "text": addText(e.str, e.h, e.x, e.y, col, 0, false); break;
      case "dim": {
        const g = dimPrimitives(e);
        for (const s2 of g.lines) polyOp([[s2[0].x, s2[0].y], [s2[1].x, s2[1].y]], false, col);
        for (const t of g.tris) polyOp(t.map(q => [q.x, q.y]), true, col, true);
        addText(g.text.str, g.text.h, g.text.x, g.text.y, col, g.text.ang, true);
        break;
      }
    }
  }
  // 標題欄(紙面座標,pt)
  if (o.title) {
    const mPt = L.m * MM2PT, fw = 90 * MM2PT, fh = L.titleH * MM2PT;
    const x1 = Wpt - mPt - fw, y1 = mPt;
    ops.push(`0 0 0 RG ${f2(x1)} ${f2(y1)} ${f2(fw)} ${f2(fh)} re S`);
    ops.push(`${f2(x1)} ${f2(y1 + fh / 2)} m ${f2(x1 + fw)} ${f2(y1 + fh / 2)} l S`);
    const tput = (str, yy) => {
      const hW = 4.2 * L.scaleN; // 紙上 4.2mm 字 → 世界字高
      addText(str, hW, L.vbX + (x1 + 2 * MM2PT) / k, L.vbY + yy / k, "#000000", 0, false);
    };
    tput(`圖名:${o.name || ""}`, y1 + fh * 0.62);
    tput(`比例 ${o.scaleN ? "1:" + o.scaleN : "符合頁面"}  單位 mm  ${o.date || ""}`, y1 + fh * 0.12);
  }
  ops.push("Q");
  ops.push(...placements);

  // ── 組裝 PDF ──
  const enc = new TextEncoder();
  const contentRaw = enc.encode(ops.join("\n"));
  const content = await deflateBytes(contentRaw);
  const objs = []; // {body:Uint8Array 或 string}
  const push = b => { objs.push(typeof b === "string" ? enc.encode(b) : b); return objs.length; };
  const imgList = [...patches.values()];
  // 物件編號:1 Catalog, 2 Pages, 3 Page, 4 Content, 5.. 影像(每張 2 個:影像+SMask)
  let xn = 5;
  const xobjRefs = [];
  const imgObjs = [];
  for (const p of imgList) {
    const rgbZ = await deflateBytes(p.rgb), alZ = await deflateBytes(p.al);
    const imgNo = xn++, smNo = xn++;
    xobjRefs.push(`/${p.name} ${imgNo} 0 R`);
    imgObjs.push({ no: imgNo, head: `<</Type/XObject/Subtype/Image/Width ${p.w}/Height ${p.h}/ColorSpace/DeviceRGB/BitsPerComponent 8/Filter/FlateDecode/SMask ${smNo} 0 R/Length ${rgbZ.length}>>`, data: rgbZ });
    imgObjs.push({ no: smNo, head: `<</Type/XObject/Subtype/Image/Width ${p.w}/Height ${p.h}/ColorSpace/DeviceGray/BitsPerComponent 8/Filter/FlateDecode/Length ${alZ.length}>>`, data: alZ });
  }
  const parts = [];
  const offsets = [0];
  let pos = 0;
  const put = u8 => { parts.push(u8); pos += u8.length; };
  const puts = s => put(enc.encode(s));
  puts("%PDF-1.4\n%\xE2\xE3\xCF\xD3\n");
  const objStart = [];
  const beginObj = no => { objStart[no] = pos; puts(`${no} 0 obj\n`); };
  beginObj(1); puts("<</Type/Catalog/Pages 2 0 R>>\nendobj\n");
  beginObj(2); puts("<</Type/Pages/Kids[3 0 R]/Count 1>>\nendobj\n");
  beginObj(3); puts(`<</Type/Page/Parent 2 0 R/MediaBox[0 0 ${f2(Wpt)} ${f2(Hpt)}]/Resources<</XObject<<${xobjRefs.join("")}>>>>/Contents 4 0 R>>\nendobj\n`);
  beginObj(4); puts(`<</Filter/FlateDecode/Length ${content.length}>>\nstream\n`); put(content); puts("\nendstream\nendobj\n");
  for (const io of imgObjs) {
    beginObj(io.no); puts(io.head + "\nstream\n"); put(io.data); puts("\nendstream\nendobj\n");
  }
  const total = xn;
  const xrefPos = pos;
  let xref = `xref\n0 ${total}\n0000000000 65535 f \n`;
  for (let i = 1; i < total; i++) xref += String(objStart[i]).padStart(10, "0") + " 00000 n \n";
  puts(xref);
  puts(`trailer\n<</Size ${total}/Root 1 0 R>>\nstartxref\n${xrefPos}\n%%EOF`);
  return new Blob(parts, { type: "application/pdf" });
}
$("btnDlPdf").onclick = async () => {
  const n = visibleEntities().length;
  toast(n > 50000 ? `產生 PDF 中…(${n} 個圖元,約需 10~30 秒)` : "產生 PDF 中…", 10000);
  await new Promise(r => setTimeout(r, 60));
  try {
    const blob = await buildPdfBlob(printOpts());
    if (!blob) { toast("沒有圖形可匯出"); return; }
    download(`圖面-${stamp()}.pdf`, blob);
    toast(`已下載 PDF(${(blob.size / 1024 / 1024).toFixed(1)} MB)`, 5000);
  } catch (err) {
    console.error(err);
    toast("PDF 產生失敗:" + (err && err.message ? err.message : err), 8000);
  }
};
$("btnPdf").onclick = () => {
  if (!visibleEntities().length) { toast("沒有圖形可匯出,請先繪製"); return; }
  $("printModal").style.display = "flex";
  refreshPreview();
};
$("btnClosePrint").onclick = () => $("printModal").style.display = "none";
for (const id of ["pPaper", "pOrient", "pScale", "pLineW", "pColor", "pTitle", "pName"]) $(id).addEventListener("input", refreshPreview);
$("btnDoPrint").onclick = () => {
  const n = visibleEntities().length;
  if (n > RASTER_PREVIEW_LIMIT) toast(`圖很大(${n} 個圖元),向量組版需 10~30 秒,請耐心等列印視窗出現…`, 12000);
  setTimeout(() => {
    const o = printOpts();
    const s = svgString(o);
    if (!s) return;
    $("printArea").innerHTML = s;
    let st = $("pageStyle");
    if (!st) { st = document.createElement("style"); st.id = "pageStyle"; document.head.appendChild(st); }
    st.textContent = `@page{size:${o.paperW}mm ${o.paperH}mm; margin:0;}`;
    window.print();
  }, 60);
};
window.addEventListener("afterprint", () => { $("printArea").innerHTML = ""; });

// ─── 上方按鈕 ───────────────────────────────────────────
$("btnNew").onclick = () => {
  if (doc.entities.length && !confirm("確定開新檔?未儲存的內容會被清除(可先按「儲存」)")) return;
  doc = DEFAULT_DOC(); currentLayer = "0"; selection.clear();
  undoStack = []; redoStack = []; idSeq = 1;
  bumpRev(); syncSettingsUI(); renderLayers(); redraw(true); autosave();
};
$("btnOpen").onclick = () => $("fileIn").click();
$("fileIn").onchange = e => { if (e.target.files[0]) openFile(e.target.files[0]); e.target.value = ""; };
$("btnSave").onclick = saveFile;
$("btnUndo").onclick = undo;
$("btnRedo").onclick = redo;
$("btnZoomExt").onclick = zoomExtents;

  const s = svgString();
  if (!s) { toast("沒有圖形可匯出"); return; }
  download(`圖面-${stamp()}.svg`, s, "image/svg+xml");
  toast("已下載 SVG");
};
$("btnPng").onclick = exportPng;
$("btnDxf").onclick = () => {
  if (!doc.entities.length) { toast("沒有圖形可匯出"); return; }
  download(`圖面-${stamp()}.dxf`, dxfString(), "application/dxf");
  toast("已下載 DXF(R12,可用 AutoCAD/ezdxf 開啟)");
};
$("btnDel").onclick = deleteSel;
$("btnDup").onclick = duplicateSel;
document.querySelectorAll("#toolbox [data-tool]").forEach(b => b.onclick = () => setTool(b.dataset.tool));

// 陣列:選取後等距複製成矩陣
$("btnArray").onclick = () => {
  if (!selection.size) { toast("請先選取要陣列的物件"); return; }
  const cols = parseInt(prompt("橫向數量(含原件):", "3") || "0");
  if (cols < 1) return;
  const rows = parseInt(prompt("縱向數量(含原件):", "1") || "0");
  if (rows < 1) return;
  const dxv = parseFloat(prompt("橫向間距 mm(往右為正):", "1000") || "0");
  const dyv = parseFloat(prompt("縱向間距 mm(往上為正):", "0") || "0");
  snapshot();
  const base = doc.entities.filter(e => selection.has(e.id));
  const newIds = [];
  for (let c = 0; c < cols; c++) for (let r = 0; r < rows; r++) {
    if (c === 0 && r === 0) continue;
    const cell = [];
    for (const e of base) {
      const cp = JSON.parse(JSON.stringify(e)); cp.id = uid();
      translateEntity(cp, dxv * c, dyv * r);
      cell.push(cp); newIds.push(cp.id);
    }
    remapGrps(cell);
    doc.entities.push(...cell);
  }
  selection = new Set([...selection, ...newIds]);
  bumpRev(); updateSelInfo(); redraw(true); autosave();
  toast(`已建立 ${cols}×${rows} 陣列`);
};

// 設備符號圖庫:點一下插入到畫面中央,可再拖曳/旋轉
const SYMBOLS = {
  "單開門": () => { const w = 900; return [
    { type: "line", x1: 0, y1: 0, x2: 0, y2: w },
    { type: "arc", cx: 0, cy: 0, r: w, a1: 0, a2: Math.PI / 2 },
    { type: "line", x1: 0, y1: 0, x2: w, y2: 0 }]; },
  "雙開門": () => { const w = 750; return [
    { type: "line", x1: 0, y1: 0, x2: 0, y2: w }, { type: "arc", cx: 0, cy: 0, r: w, a1: 0, a2: Math.PI / 2 },
    { type: "line", x1: 1500, y1: 0, x2: 1500, y2: w }, { type: "arc", cx: 1500, cy: 0, r: w, a1: Math.PI / 2, a2: Math.PI }]; },
  "窗": () => [
    { type: "rect", x: 0, y: 0, w: 1500, h: 200 },
    { type: "line", x1: 0, y1: 100, x2: 1500, y2: 100 }],
  "配電盤": () => [
    { type: "rect", x: 0, y: 0, w: 800, h: 400 },
    { type: "line", x1: 0, y1: 0, x2: 800, y2: 400 }, { type: "text", x: 250, y: 170, h: 100, str: "盤" }],
  "電池櫃": () => [
    { type: "rect", x: 0, y: 0, w: 600, h: 800 },
    { type: "line", x1: 0, y1: 267, x2: 600, y2: 267 }, { type: "line", x1: 0, y1: 533, x2: 600, y2: 533 }],
  "桌": () => [{ type: "rect", x: 0, y: 0, w: 1400, h: 700 }],
  "馬桶": () => [
    { type: "rect", x: 0, y: 0, w: 380, h: 200 },
    { type: "arc", cx: 190, cy: 200, r: 190, a1: 0, a2: Math.PI }],
  "圓桌": () => [{ type: "circle", cx: 0, cy: 0, r: 600 }],
};
$("btnLib").onclick = () => {
  const names = Object.keys(SYMBOLS);
  const pick = prompt("插入設備符號(輸入編號):\n" + names.map((n, i) => `${i + 1}. ${n}`).join("\n"), "1");
  const idx = parseInt(pick) - 1;
  if (isNaN(idx) || idx < 0 || idx >= names.length) return;
  const parts = SYMBOLS[names[idx]]();
  // 放到目前畫面中央
  const c = s2w(cv._w / 2, cv._h / 2);
  snapshot();
  const ids = [];
  const g = uid(); // 符號自動成群組,點一下選整個
  for (const e of parts) { translateEntity(e, c.x, c.y); e.id = uid(); e.layer = currentLayer; if (parts.length > 1) e.grp = g; doc.entities.push(e); ids.push(e.id); }
  selection = new Set(ids);
  setTool("select");
  bumpRev(); updateSelInfo(); redraw(true); autosave();
  toast(`已插入「${names[idx]}」— 可拖曳移動或用旋轉工具調整`);
};

// ─── 我的圖面(多圖面管理,存 localStorage) ─────────────
const FILE_PREFIX = "cad-file:";
function fmRefresh() {
  const list = $("fmList");
  list.innerHTML = "";
  const items = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(FILE_PREFIX)) {
      try {
        const meta = JSON.parse(localStorage.getItem(k));
        items.push({ name: k.slice(FILE_PREFIX.length), t: meta.t || 0, n: meta.n || 0 });
      } catch { }
    }
  }
  items.sort((a, b) => b.t - a.t);
  if (!items.length) { list.innerHTML = "<div style='color:var(--dim);padding:16px'>還沒有存過圖面</div>"; return; }
  for (const it of items) {
    const row = document.createElement("div");
    row.className = "fmRow";
    const d = new Date(it.t);
    row.innerHTML = `<span class="nm">${it.name}</span>
      <span class="meta">${it.n} 圖元 · ${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}</span>`;
    const bo = document.createElement("button"); bo.textContent = "開啟"; bo.className = "primary";
    bo.onclick = () => {
      try {
        const o = JSON.parse(localStorage.getItem(FILE_PREFIX + it.name));
        applyLoadedDoc(o.doc, it.name);
        $("filesModal").style.display = "none";
      } catch { toast("讀取失敗,資料可能損毀"); }
    };
    const bd = document.createElement("button"); bd.textContent = "刪除";
    bd.onclick = () => {
      if (!confirm(`確定刪除「${it.name}」?`)) return;
      localStorage.removeItem(FILE_PREFIX + it.name);
      fmRefresh();
    };
    row.append(bo, bd);
    list.appendChild(row);
  }
}
$("btnFiles").onclick = () => { $("filesModal").style.display = "flex"; $("fmName").value = ""; fmRefresh(); };
$("btnCloseFiles").onclick = () => $("filesModal").style.display = "none";
$("fmSave").onclick = () => {
  const name = $("fmName").value.trim();
  if (!name) { toast("請先輸入圖面名稱"); return; }
  try {
    localStorage.setItem(FILE_PREFIX + name, JSON.stringify({ t: Date.now(), n: doc.entities.length, doc }));
    toast(`已儲存「${name}」(${doc.entities.length} 個圖元)`);
    fmRefresh();
  } catch {
    toast("圖面太大,瀏覽器存不下 — 請用「儲存」下載 .json 檔", 6000);
  }
};

}

  syncSettingsUI(); redraw(true); autosave();
  toast(`字高已設為 ${h} mm`);
};
["chkGrid", "chkSnapGrid", "chkOsnap", "chkOrtho", "chkCross"].forEach(id => $(id).onchange = () => redraw(true));

  get doc() { return doc; }, get view() { return view; }, get selection() { return selection; },

};
