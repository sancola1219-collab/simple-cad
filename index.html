<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>簡易CAD — 2D 繪圖</title>
<style>
:root{
  --bg:#1e2126; --panel:#262a31; --panel2:#2d323b; --border:#3a4048;
  --fg:#d8dde4; --dim:#8a939e; --acc:#4da3ff; --accdark:#2b6cb0; --danger:#e06060;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; overflow:hidden;}
body{font-family:"Microsoft JhengHei","Segoe UI",sans-serif; background:var(--bg); color:var(--fg); font-size:13px;}
#app{display:flex; flex-direction:column; height:100%;}

/* ── 上方工具列 ── */
#topbar{display:flex; align-items:center; gap:4px; padding:6px 8px; background:var(--panel); border-bottom:1px solid var(--border); flex-wrap:wrap;}
#topbar .title{font-weight:bold; margin-right:10px; color:var(--acc);}
button{background:var(--panel2); color:var(--fg); border:1px solid var(--border); border-radius:4px; padding:5px 10px; cursor:pointer; font-size:13px; font-family:inherit;}
button:hover{background:#3a414c;}
button.primary{background:var(--accdark); border-color:var(--acc);}
button.primary:hover{background:#3182ce;}
.sep{width:1px; height:22px; background:var(--border); margin:0 6px;}

/* ── 主區 ── */
#main{display:flex; flex:1; min-height:0;}
#toolbox{width:92px; background:var(--panel); border-right:1px solid var(--border); padding:6px; display:flex; flex-direction:column; gap:4px; overflow-y:auto;}
#toolbox button{width:100%; text-align:left; padding:7px 8px;}
#toolbox button.active{background:var(--accdark); border-color:var(--acc); color:#fff;}
#toolbox .grp{color:var(--dim); font-size:11px; margin-top:6px;}

#canvasWrap{flex:1; position:relative; min-width:0;}
#cv{position:absolute; inset:0; width:100%; height:100%; display:block; cursor:crosshair; touch-action:none;}
#touchBar{position:absolute; left:50%; transform:translateX(-50%); bottom:14px; display:none; gap:8px; z-index:15;}
#touchBar button{padding:10px 16px; font-size:15px; border-radius:8px; background:#2b6cb0ee; border-color:var(--acc); color:#fff;}
.mobile-only{display:none;}
#floatIn{position:absolute; display:none; z-index:20; width:150px; padding:4px 6px; background:#fff; color:#000; border:2px solid var(--acc); border-radius:3px; font-size:14px; font-family:inherit;}

#side{width:230px; background:var(--panel); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto;}
#side h3{font-size:12px; color:var(--dim); padding:8px 10px 4px; text-transform:uppercase;}
#layerList{padding:0 8px;}
.layerRow{display:flex; align-items:center; gap:5px; padding:4px 5px; border-radius:4px; cursor:pointer;}
.layerRow.current{background:var(--panel2); outline:1px solid var(--acc);}
.layerRow input[type=color]{width:22px; height:20px; border:none; background:none; padding:0; cursor:pointer;}
.layerRow .lname{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.layerRow .icon{cursor:pointer; opacity:.85; user-select:none;}
.layerRow .icon.off{opacity:.3;}
#side .box{padding:4px 10px 10px;}
#side label{display:flex; align-items:center; gap:6px; margin:4px 0; color:var(--dim);}
#side input[type=number]{width:70px; background:var(--panel2); border:1px solid var(--border); color:var(--fg); padding:3px 5px; border-radius:3px;}
#side input[type=checkbox]{accent-color:var(--acc);}
#selInfo{padding:4px 10px; color:var(--dim); font-size:12px; line-height:1.6;}

/* ── 狀態列 ── */
#status{display:flex; gap:16px; padding:4px 10px; background:var(--panel); border-top:1px solid var(--border); color:var(--dim); font-size:12px;}
#hint{color:var(--acc);}
#coords{margin-left:auto; font-variant-numeric:tabular-nums;}

/* ── 提示訊息 ── */
#toast{position:fixed; bottom:44px; left:50%; transform:translateX(-50%); background:#111a; color:#fff; padding:8px 18px; border-radius:6px; display:none; z-index:100; max-width:70%;}

/* ── 列印/匯出 PDF 視窗 ── */
#printModal{position:fixed; inset:0; background:#000a; display:none; z-index:50; align-items:center; justify-content:center;}
#printModal .dlg{background:var(--panel); border:1px solid var(--border); border-radius:8px; width:min(880px,94vw); max-height:92vh; display:flex; flex-direction:column;}
#printModal .dlgHead{display:flex; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border); font-weight:bold;}
#printModal .dlgHead button{margin-left:auto;}
#printModal .dlgBody{display:flex; gap:12px; padding:12px; min-height:0; flex:1;}
#printOpts{width:240px; display:flex; flex-direction:column; gap:8px;}
#printOpts label{display:flex; flex-direction:column; gap:3px; color:var(--dim); font-size:12px;}
#printOpts select,#printOpts input[type=text]{background:var(--panel2); border:1px solid var(--border); color:var(--fg); padding:5px; border-radius:4px; font-family:inherit;}
#printOpts .chk{flex-direction:row; align-items:center;}
#previewWrap{flex:1; background:#555; border-radius:4px; display:flex; align-items:center; justify-content:center; overflow:auto; padding:12px;}
#previewWrap svg{background:#fff; box-shadow:0 2px 14px #0008;}

/* ── 手機/窄螢幕 ── */
@media (max-width: 820px){
  .mobile-only{display:inline-block;}
  .desktop-only{display:none !important;}
  #topbar{padding:4px;}
  #topbar button{padding:7px 9px;}
  #main{flex-direction:column;}
  #canvasWrap{order:1;}
  #toolbox{order:2; width:100%; flex-direction:row; overflow-x:auto; overflow-y:hidden;
    border-right:none; border-top:1px solid var(--border); padding:4px; gap:4px;}
  #toolbox .grp{display:none;}
  #toolbox button{flex:0 0 auto; width:auto; padding:9px 10px; font-size:14px;}
  #side{position:fixed; right:0; top:0; bottom:0; width:min(78vw,290px); z-index:45;
    transform:translateX(100%); transition:transform .18s; box-shadow:-6px 0 16px #000a;}
  #side.open{transform:none;}
  #status{font-size:11px; gap:8px;}
  #printModal .dlg{max-height:96vh; width:96vw;}
  #printModal .dlgBody{flex-direction:column; overflow-y:auto;}
  #printOpts{width:100%;}
  #previewWrap{min-height:220px;}
}

/* ── 實際列印 ── */
#printArea{display:none;}
@media print{
  body>#app,#printModal,#toast{display:none !important;}
  html,body{overflow:visible; background:#fff;}
  #printArea{display:block !important;}
  #printArea svg{display:block;}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span class="title">簡易CAD</span>
    <button id="btnNew">新增</button>
    <button id="btnOpen">開啟</button>
    <button id="btnSave">儲存</button>
    <span class="sep"></span>
    <button id="btnUndo">↩ 復原</button>
    <button id="btnRedo">↪ 重做</button>
    <span class="sep"></span>
    <button id="btnZoomExt">縮放全圖</button>
    <span class="sep"></span>
    <button id="btnPdf" class="primary">匯出 PDF</button>
    <button id="btnSvg" class="desktop-only">SVG</button>
    <button id="btnPng" class="desktop-only">PNG</button>
    <button id="btnDxf">DXF</button>
    <button id="btnPanel" class="mobile-only">☰ 圖層</button>
    <input type="file" id="fileIn" accept=".json,.dxf,.dwg" style="display:none">
  </div>
  <div id="main">
    <div id="toolbox">
      <div class="grp">工具</div>
      <button data-tool="select">▣ 選取</button>
      <button data-tool="line">╱ 線段 L</button>
      <button data-tool="rect">▭ 矩形 R</button>
      <button data-tool="circle">◯ 圓 C</button>
      <button data-tool="arc">◠ 圓弧 A</button>
      <button data-tool="poly">⌒ 折線 P</button>
      <button data-tool="text">A 文字 T</button>
      <button data-tool="dim">⟷ 標註 D</button>
      <button data-tool="measure">📏 量測 M</button>
      <div class="grp">編輯</div>
      <button id="btnDup">⧉ 複製</button>
      <button id="btnDel">✕ 刪除</button>
    </div>
    <div id="canvasWrap">
      <canvas id="cv"></canvas>
      <input id="floatIn" autocomplete="off">
      <div id="touchBar">
        <button id="tbLen">⌨ 長度</button>
        <button id="tbDone">✓ 完成</button>
        <button id="tbCancel">✕ 取消</button>
      </div>
    </div>
    <div id="side">
      <h3>圖層 <button id="btnAddLayer" style="float:right;padding:1px 8px;margin-right:8px">＋</button></h3>
      <div id="layerList"></div>
      <h3>輔助</h3>
      <div class="box">
        <label><input type="checkbox" id="chkGrid" checked> 顯示格點</label>
        <label><input type="checkbox" id="chkSnapGrid" checked> 格點鎖點</label>
        <label><input type="checkbox" id="chkOsnap" checked> 物件鎖點</label>
        <label><input type="checkbox" id="chkOrtho"> 正交 (Shift)</label>
      </div>
      <h3>文字/標註</h3>
      <div class="box">
        <label>文字高度 <input type="number" id="inTextH" min="0.1" step="0.5"> mm</label>
        <label>標註字高 <input type="number" id="inDimH" min="0.1" step="0.5"> mm</label>
        <button id="btnAutoH" style="margin-top:4px">依圖面自動調整字高</button>
      </div>
      <h3>選取資訊</h3>
      <div id="selInfo">未選取</div>
    </div>
  </div>
  <div id="status">
    <span id="hint">選取:點選或框選物件</span>
    <span id="coords">0.0, 0.0</span>
  </div>
</div>

<div id="toast"></div>

<div id="printModal">
  <div class="dlg">
    <div class="dlgHead">匯出 PDF / 列印 <button id="btnClosePrint">✕ 關閉</button></div>
    <div class="dlgBody">
      <div id="printOpts">
        <label>紙張
          <select id="pPaper"><option value="A4">A4 (210×297)</option><option value="A3">A3 (297×420)</option></select>
        </label>
        <label>方向
          <select id="pOrient"><option value="landscape">橫向</option><option value="portrait">直向</option></select>
        </label>
        <label>比例
          <select id="pScale">
            <option value="fit">符合頁面</option>
            <option value="1">1:1</option><option value="2">1:2</option><option value="5">1:5</option>
            <option value="10">1:10</option><option value="20">1:20</option><option value="50">1:50</option>
            <option value="100">1:100</option><option value="200">1:200</option>
          </select>
        </label>
        <label class="chk"><input type="checkbox" id="pTitle" checked> 標題欄</label>
        <label>圖名 <input type="text" id="pName" value="未命名圖面"></label>
        <div style="color:var(--dim);font-size:12px;line-height:1.5">
          按「列印」後,在印表機選<b>「另存為 PDF」</b>或<b>「Microsoft Print to PDF」</b>即可存成 PDF 檔。
        </div>
        <button id="btnDoPrint" class="primary" style="margin-top:auto">🖨 列印 / 存成 PDF</button>
      </div>
      <div id="previewWrap"></div>
    </div>
  </div>
</div>

<div id="printArea"></div>

<script>
"use strict";
/* ============================================================
   簡易CAD — 單檔 2D 繪圖軟體
   座標系:單位 mm,y 向上,原點左下(與 圖面繪製 規約一致)
   ============================================================ */

// ─── 狀態 ───────────────────────────────────────────────
const DEFAULT_DOC = () => ({
  version: 1, units: "mm",
  layers: [{ name: "0", color: "#e8e8e8", visible: true, locked: false }],
  entities: [],
  settings: { textH: 3.5, dimH: 3.5 },
});
let doc = DEFAULT_DOC();
let currentLayer = "0";
let view = { scale: 1, tx: 60, ty: 0 };   // sx = wx*scale+tx ; sy = -wy*scale+ty
let tool = "select";
let pts = [];            // 繪製中已點的世界座標點
let cursorW = { x: 0, y: 0 };  // 目前游標(已鎖點)的世界座標
let cursorS = { x: 0, y: 0 };  // 螢幕座標
let snapMark = null;     // 鎖點標記 {x,y,kind}
let selection = new Set();
let marquee = null;      // 框選 {x1,y1,x2,y2} 螢幕座標
let moveDrag = null;     // 移動中 {lastW}
let panning = null;
let spaceHeld = false;
let idSeq = 1;
let undoStack = [], redoStack = [];

const $ = id => document.getElementById(id);
const cv = $("cv"), ctx = cv.getContext("2d");

// ─── 小工具 ─────────────────────────────────────────────
function uid() { return idSeq++; }
function fmt(v) { return String(parseFloat(v.toFixed(2))); }
function toast(msg, ms = 2200) {
  const t = $("toast"); t.textContent = msg; t.style.display = "block";
  clearTimeout(t._tm); t._tm = setTimeout(() => t.style.display = "none", ms);
}
function w2s(p) { return { x: p.x * view.scale + view.tx, y: -p.y * view.scale + view.ty }; }
function s2w(x, y) { return { x: (x - view.tx) / view.scale, y: (view.ty - y) / view.scale }; }
// ── 大圖效能:文件版本號 + 圖層表/可見清單/空間網格快取 ──
let docRev = 0, lmapCache = null, visCache = null, spatial = null;
function bumpRev() { docRev++; lmapCache = null; visCache = null; spatial = null; }
function layerMap() {
  if (!lmapCache || lmapCache.rev !== docRev)
    lmapCache = { rev: docRev, m: new Map(doc.layers.map(l => [l.name, l])) };
  return lmapCache.m;
}
function layerOf(e) { return layerMap().get(e.layer) || doc.layers[0]; }
function visibleEntities() {
  if (!visCache || visCache.rev !== docRev)
    visCache = { rev: docRev, list: doc.entities.filter(e => layerOf(e).visible) };
  return visCache.list;
}
function editableEntities() { return visibleEntities().filter(e => !layerOf(e).locked); }
function buildSpatial() { // 均勻網格:鎖點/點選只查游標附近
  const list = visibleEntities();
  let b = { minx: 0, miny: 0, maxx: 1, maxy: 1 };
  if (list.length) b = extents(list) || b;
  const cs = Math.max(b.maxx - b.minx, b.maxy - b.miny, 100) / 96;
  const map = new Map(), big = [];
  for (const e of list) {
    const q = bboxCached(e);
    const x0 = Math.floor(q.minx / cs), x1 = Math.floor(q.maxx / cs);
    const y0 = Math.floor(q.miny / cs), y1 = Math.floor(q.maxy / cs);
    if ((x1 - x0 + 1) * (y1 - y0 + 1) > 64) { big.push(e); continue; } // 跨太多格的大物件
    for (let gx = x0; gx <= x1; gx++) for (let gy = y0; gy <= y1; gy++) {
      const k = gx + "," + gy;
      let a = map.get(k); if (!a) map.set(k, a = []);
      a.push(e);
    }
  }
  spatial = { rev: docRev, cs, map, big };
}
function nearEntities(w, tw) { // 游標附近(世界座標 ± tw)的可見物件
  if (!spatial || spatial.rev !== docRev) buildSpatial();
  const cs = spatial.cs, out = [], seen = new Set();
  const x0 = Math.floor((w.x - tw) / cs), x1 = Math.floor((w.x + tw) / cs);
  const y0 = Math.floor((w.y - tw) / cs), y1 = Math.floor((w.y + tw) / cs);
  // 視圖縮很小時 tw(世界單位)可能極大 → 掃描格數爆炸,退回全清單
  if ((x1 - x0 + 1) * (y1 - y0 + 1) > 4096) return visibleEntities();
  for (let gx = x0; gx <= x1; gx++) for (let gy = y0; gy <= y1; gy++) {
    const a = spatial.map.get(gx + "," + gy);
    if (a) for (const e of a) if (!seen.has(e.id)) { seen.add(e.id); out.push(e); }
  }
  for (const e of spatial.big) out.push(e);
  return out;
}

// ─── 復原/重做 ──────────────────────────────────────────
function snapshot() {
  const s = JSON.stringify({ en: doc.entities, ly: doc.layers, cl: currentLayer });
  undoStack.push(s);
  const cap = s.length > 5e6 ? 10 : 100; // 大圖限制快照數,避免吃光記憶體
  while (undoStack.length > cap) undoStack.shift();
  redoStack = [];
}
function restore(s) {
  const o = JSON.parse(s);
  doc.entities = o.en; doc.layers = o.ly; currentLayer = o.cl;
  selection.clear(); bumpRev(); renderLayers(); redraw(true); autosave();
}
function undo() {
  if (!undoStack.length) { toast("沒有可復原的步驟"); return; }
  redoStack.push(JSON.stringify({ en: doc.entities, ly: doc.layers, cl: currentLayer }));
  restore(undoStack.pop());
}
function redo() {
  if (!redoStack.length) { toast("沒有可重做的步驟"); return; }
  undoStack.push(JSON.stringify({ en: doc.entities, ly: doc.layers, cl: currentLayer }));
  restore(redoStack.pop());
}

// ─── 幾何 ───────────────────────────────────────────────
function entPoints(e) { // 物件的特徵點(供鎖點/包圍盒)
  switch (e.type) {
    case "line": return [
      { x: e.x1, y: e.y1, kind: "端點" }, { x: e.x2, y: e.y2, kind: "端點" },
      { x: (e.x1 + e.x2) / 2, y: (e.y1 + e.y2) / 2, kind: "中點" }];
    case "rect": {
      const c = [[e.x, e.y], [e.x + e.w, e.y], [e.x + e.w, e.y + e.h], [e.x, e.y + e.h]];
      const p = c.map(q => ({ x: q[0], y: q[1], kind: "端點" }));
      for (let i = 0; i < 4; i++) { const a = c[i], b = c[(i + 1) % 4]; p.push({ x: (a[0] + b[0]) / 2, y: (a[1] + b[1]) / 2, kind: "中點" }); }
      return p;
    }
    case "circle": return [
      { x: e.cx, y: e.cy, kind: "圓心" },
      { x: e.cx + e.r, y: e.cy, kind: "四分點" }, { x: e.cx - e.r, y: e.cy, kind: "四分點" },
      { x: e.cx, y: e.cy + e.r, kind: "四分點" }, { x: e.cx, y: e.cy - e.r, kind: "四分點" }];
    case "arc": return [
      { x: e.cx, y: e.cy, kind: "圓心" },
      { x: e.cx + e.r * Math.cos(e.a1), y: e.cy + e.r * Math.sin(e.a1), kind: "端點" },
      { x: e.cx + e.r * Math.cos(e.a2), y: e.cy + e.r * Math.sin(e.a2), kind: "端點" }];
    case "poly": {
      const p = e.pts.map(q => ({ x: q[0], y: q[1], kind: "端點" }));
      for (let i = 0; i < e.pts.length - (e.closed ? 0 : 1); i++) {
        const a = e.pts[i], b = e.pts[(i + 1) % e.pts.length];
        p.push({ x: (a[0] + b[0]) / 2, y: (a[1] + b[1]) / 2, kind: "中點" });
      }
      return p;
    }
    case "text": return [{ x: e.x, y: e.y, kind: "端點" }];
    case "dim": return [{ x: e.x1, y: e.y1, kind: "端點" }, { x: e.x2, y: e.y2, kind: "端點" }];
  }
  return [];
}
function bbox(e) {
  let xs = [], ys = [];
  if (e.type === "circle") { xs = [e.cx - e.r, e.cx + e.r]; ys = [e.cy - e.r, e.cy + e.r]; }
  else if (e.type === "arc") { xs = [e.cx - e.r, e.cx + e.r]; ys = [e.cy - e.r, e.cy + e.r]; }
  else if (e.type === "text") { const w = e.str.length * e.h; xs = [e.x, e.x + w]; ys = [e.y, e.y + e.h]; }
  else if (e.type === "dim") { for (const s of dimPrimitives(e).lines) { xs.push(s[0].x, s[1].x); ys.push(s[0].y, s[1].y); } }
  else { for (const p of entPoints(e)) { xs.push(p.x); ys.push(p.y); } }
  return { minx: Math.min(...xs), miny: Math.min(...ys), maxx: Math.max(...xs), maxy: Math.max(...ys) };
}
let bbCache = new WeakMap(); // 包圍盒快取:大圖下鎖點/點選的粗篩必需
function bboxCached(e) {
  let b = bbCache.get(e);
  if (!b) { b = bbox(e); bbCache.set(e, b); }
  return b;
}
function bbInvalidate(e) { bbCache.delete(e); }
function extents(list) {
  const es = list || visibleEntities();
  if (!es.length) return null;
  let b = { minx: Infinity, miny: Infinity, maxx: -Infinity, maxy: -Infinity };
  for (const e of es) {
    const q = bbox(e);
    b.minx = Math.min(b.minx, q.minx); b.miny = Math.min(b.miny, q.miny);
    b.maxx = Math.max(b.maxx, q.maxx); b.maxy = Math.max(b.maxy, q.maxy);
  }
  return b;
}
function distSeg(p, a, b) { // 點到線段距離
  const dx = b.x - a.x, dy = b.y - a.y, L2 = dx * dx + dy * dy;
  if (L2 === 0) return Math.hypot(p.x - a.x, p.y - a.y);
  let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / L2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(p.x - (a.x + t * dx), p.y - (a.y + t * dy));
}
function polySegs(e) { // rect/poly 拆成線段
  if (e.type === "rect") {

// ─── 標註幾何(Canvas / SVG / DXF 共用) ─────────────────
function dimPrimitives(d, hOver) {

    [{ x: d.x1 + nx * so * gap, y: d.y1 + ny * so * gap }, { x: A.x + nx * so * ext, y: A.y + ny * so * ext }],
    [{ x: d.x2 + nx * so * gap, y: d.y2 + ny * so * gap }, { x: B.x + nx * so * ext, y: B.y + ny * so * ext }],
    [A, B],

    [A, { x: A.x + ux * ah + nx * ah * .3, y: A.y + uy * ah + ny * ah * .3 }, { x: A.x + ux * ah - nx * ah * .3, y: A.y + uy * ah - ny * ah * .3 }],
    [B, { x: B.x - ux * ah + nx * ah * .3, y: B.y - uy * ah + ny * ah * .3 }, { x: B.x - ux * ah - nx * ah * .3, y: B.y - uy * ah - ny * ah * .3 }],

// ─── 鎖點 ───────────────────────────────────────────────

// ─── 繪製 ───────────────────────────────────────────────

// ─── 工具/事件 ──────────────────────────────────────────
const HINTS = {
  select: "選取:點選或框選物件;拖曳移動;雙擊文字可編輯",
  line: "線段:點第一點,再點下一點(可連續);右鍵或 Esc 結束;可直接輸入長度",
  rect: "矩形:點兩個對角",
  circle: "圓:點圓心,再點半徑(可輸入數字指定半徑)",
  arc: "圓弧:點圓心 → 起點 → 終點方向(逆時針)",
  poly: "折線:連續點,右鍵結束;點回起點可封閉",
  text: "文字:點放置位置後輸入內容,Enter 確定",
  dim: "標註:點兩個端點,再點標註線位置",
  measure: "量測:點兩點顯示距離",

function setTool(t) {

  document.querySelectorAll("#toolbox [data-tool]").forEach(b => b.classList.toggle("active", b.dataset.tool === t));
  $("hint").textContent = HINTS[t] || "";

}

  if (tool === "poly" && pts.length >= 2) { finishPoly(false); updateTouchBar(); return; }
  if (tool === "line" && pts.length) { pts = []; redraw(); updateTouchBar(); return; }

cv.addEventListener("contextmenu", e => e.preventDefault());
cv.addEventListener("mousedown", e => {
  const r = cv.getBoundingClientRect(), mx = e.clientX - r.left, my = e.clientY - r.top;
  if (e.button === 1 || (e.button === 0 && spaceHeld)) { panning = { mx, my }; e.preventDefault(); return; }
  if (e.button === 2) { cancelTool(); return; }
  if (e.button !== 0) return;
  hideFloat();
  let w = getSnap(mx, my);
  const ref = pts.length ? pts[pts.length - 1] : null;
  w = applyOrtho(w, ref);

  if (tool === "select") {
    const hit = hitTest(w);
    if (hit) {
      if (e.shiftKey) { selection.has(hit.id) ? selection.delete(hit.id) : selection.add(hit.id); }
      else if (!selection.has(hit.id)) { selection.clear(); selection.add(hit.id); }
      moveDrag = { lastW: w, moved: false };
    } else {
      if (!e.shiftKey) selection.clear();
      marquee = { x1: mx, y1: my, x2: mx, y2: my };
    }
    updateSelInfo(); redraw(true);
  } else {

  }

});
// 繪圖工具的落點邏輯(滑鼠與觸控共用)
function drawingClick(w) {
  switch (tool) {
    case "line":
      pts.push(w);
      if (pts.length === 2) { addEntity({ type: "line", x1: pts[0].x, y1: pts[0].y, x2: pts[1].x, y2: pts[1].y }); pts = [pts[1]]; }
      break;
    case "rect":
      pts.push(w);
      if (pts.length === 2) {
        const a = pts[0];
        addEntity({ type: "rect", x: Math.min(a.x, w.x), y: Math.min(a.y, w.y), w: Math.abs(w.x - a.x), h: Math.abs(w.y - a.y) });
        pts = [];
      }
      break;
    case "circle":
      pts.push(w);
      if (pts.length === 2) {
        const rr = Math.hypot(w.x - pts[0].x, w.y - pts[0].y);
        if (rr > 1e-9) addEntity({ type: "circle", cx: pts[0].x, cy: pts[0].y, r: rr });
        pts = [];
      }
      break;
    case "arc":
      pts.push(w);
      if (pts.length === 3) {
        const c0 = pts[0], rr = Math.hypot(pts[1].x - c0.x, pts[1].y - c0.y);

          a1: Math.atan2(pts[1].y - c0.y, pts[1].x - c0.x),
          a2: Math.atan2(w.y - c0.y, w.x - c0.x),
        });
        pts = [];
      }
      break;
    case "poly": {
      if (pts.length >= 3 && Math.hypot(w.x - pts[0].x, w.y - pts[0].y) < 8 / view.scale) { finishPoly(true); break; }
      pts.push(w);
      break;
    }
    case "text": {
      const s = w2s(w);
      floatInput(s.x, s.y - 30, "", str => {
        if (str.trim()) addEntity({ type: "text", x: w.x, y: w.y, h: doc.settings.textH, str: str.trim() });
      });
      break;
    }
    case "dim":
      pts.push(w);
      if (pts.length === 3) {
        addEntity({ type: "dim", x1: pts[0].x, y1: pts[0].y, x2: pts[1].x, y2: pts[1].y, off: dimOffsetFrom(w) });
        pts = [];
      }
      break;
    case "measure":
      pts.push(w);
      if (pts.length === 2) {
        const d = Math.hypot(w.x - pts[0].x, w.y - pts[0].y);
        toast(`距離 ${fmt(d)} mm(ΔX ${fmt(w.x - pts[0].x)}, ΔY ${fmt(w.y - pts[0].y)})`, 4000);

cv.addEventListener("mousemove", e => {

      if (!moveDrag.moved) { snapshot(); moveDrag.moved = true; }

window.addEventListener("mouseup", e => {

    const a = s2w(Math.min(m.x1, m.x2), Math.max(m.y1, m.y2)); // 左下
    const b = s2w(Math.max(m.x1, m.x2), Math.min(m.y1, m.y2)); // 右上
    const crossing = m.x2 < m.x1;
    for (const en of editableEntities()) {
      const q = bboxCached(en);
      const inside = q.minx >= a.x && q.maxx <= b.x && q.miny >= a.y && q.maxy <= b.y;

cv.addEventListener("wheel", e => {

  const w = s2w(mx, my);

function editTextAt(w) { // 雙擊/雙點文字進入編輯(滑鼠與觸控共用)

// ─── 觸控支援(手機/平板):單指點=下點/選取,單指拖=平移(拖已選=移動),雙指=縮放平移,長按=取消/結束 ───
const touchPts = new Map();

const TOUCH_TOL = 18; // 手指鎖點容差(px)
cv.addEventListener("pointerdown", e => {
  lastPointerType = e.pointerType;
  if (e.pointerType !== "touch") return;
  e.preventDefault(); // 抑制相容性滑鼠事件,避免雙重觸發
  hideFloat();
  const r = cv.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  touchPts.set(e.pointerId, { x: mx, y: my });
  if (touchPts.size === 1) {
    if (touchState) clearTimeout(touchState.lp);
    touchState = { mode: "tap", startX: mx, startY: my, lastX: mx, lastY: my };
    touchState.lp = setTimeout(() => { if (touchState) { touchState.mode = "done"; cancelTool(); updateTouchBar(); } }, 550);
    if (tool === "select") {
      const hit = hitTest(s2w(mx, my));
      if (hit && selection.has(hit.id)) touchState.hit = hit; // 按在已選物件上 → 拖曳移動
    }

    const [a, b] = [...touchPts.values()];

      mode: "pinch", d0: Math.hypot(a.x - b.x, a.y - b.y) || 1,
      cx: (a.x + b.x) / 2, cy: (a.y + b.y) / 2,
      scale0: view.scale, tx0: view.tx, ty0: view.ty,

  }
}, { passive: false });
cv.addEventListener("pointermove", e => {
  if (e.pointerType !== "touch" || !touchPts.has(e.pointerId)) return;
  e.preventDefault();
  const r = cv.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  touchPts.set(e.pointerId, { x: mx, y: my });
  if (!touchState) return;
  if (touchState.mode === "pinch" && touchPts.size >= 2) {
    const [a, b] = [...touchPts.values()];
    const d = Math.hypot(a.x - b.x, a.y - b.y) || 1;
    const ns = Math.min(1e4, Math.max(1e-5, touchState.scale0 * d / touchState.d0));
    const k = ns / touchState.scale0;
    const ncx = (a.x + b.x) / 2, ncy = (a.y + b.y) / 2;
    view.scale = ns;
    view.tx = ncx - (touchState.cx - touchState.tx0) * k;
    view.ty = ncy - (touchState.cy - touchState.ty0) * k;

      touchState.mode = "move";
      moveDrag = { lastW: getSnap(touchState.startX, touchState.startY, TOUCH_TOL), moved: false };

      touchState.mode = "rubber"; // 繪製中拖曳 = 調整橡皮筋方向(供「長度」輸入用)
    } else {
      touchState.mode = "pan";

    const w = getSnap(mx, my, TOUCH_TOL);
    const ddx = w.x - moveDrag.lastW.x, ddy = w.y - moveDrag.lastW.y;
    if (ddx || ddy) {
      if (!moveDrag.moved) { snapshot(); moveDrag.moved = true; }
      for (const e2 of doc.entities) if (selection.has(e2.id)) translateEntity(e2, ddx, ddy);
      moveDrag.lastW = w;
      redraw(true);
    }

cv.addEventListener("pointerup", touchEnd);
cv.addEventListener("pointercancel", touchEnd);
function touchTap(mx, my) {
  const now = Date.now();

  if (tool === "select") {
    if (now - lastTap.t < 350 && Math.hypot(mx - lastTap.x, my - lastTap.y) < 28 && editTextAt(w0)) {
      lastTap = { t: 0, x: 0, y: 0 }; return;
    }

      else { selection.clear(); selection.add(hit.id); }
    } else selection.clear();
    updateSelInfo(); redraw(true);
  } else {
    let w = getSnap(mx, my, TOUCH_TOL);

function updateTouchBar() {

  if (show) {
    $("tbLen").style.display = ["line", "poly", "circle"].includes(tool) ? "" : "none";

$("tbCancel").onclick = () => { cancelTool(); updateTouchBar(); };

    const d = parseFloat(val);

    const last = pts[pts.length - 1];
    if (tool === "circle") { addEntity({ type: "circle", cx: last.x, cy: last.y, r: d }); pts = []; }
    else {
      let dx = cursorW.x - last.x, dy = cursorW.y - last.y;

      const np = { x: last.x + dx / L * d, y: last.y + dy / L * d };
      if (tool === "line") { addEntity({ type: "line", x1: last.x, y1: last.y, x2: np.x, y2: np.y }); pts = [np]; }

// 鍵盤
window.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;
  if (e.key === " ") { spaceHeld = true; cv.style.cursor = "grab"; e.preventDefault(); return; }
  if (e.ctrlKey && e.key.toLowerCase() === "z") { e.preventDefault(); undo(); return; }
  if (e.ctrlKey && e.key.toLowerCase() === "y") { e.preventDefault(); redo(); return; }
  if (e.ctrlKey && e.key.toLowerCase() === "s") { e.preventDefault(); saveFile(); return; }
  if (e.ctrlKey && e.key.toLowerCase() === "d") { e.preventDefault(); duplicateSel(); return; }
  if (e.key === "Escape") { cancelTool(); return; }
  if (e.key === "Delete" || e.key === "Backspace") { deleteSel(); return; }
  if (e.key === "Enter" && tool === "poly") { finishPoly(false); return; }
  const map = { l: "line", r: "rect", c: "circle", a: "arc", p: "poly", t: "text", d: "dim", m: "measure", s: "select" };
  if (!e.ctrlKey && map[e.key.toLowerCase()]) { setTool(map[e.key.toLowerCase()]); return; }
  // 繪製中輸入數字 → 長度/半徑
  if (/^[0-9.]$/.test(e.key) && pts.length && ["line", "circle", "poly"].includes(tool)) {
    floatInput(cursorS.x + 15, cursorS.y + 15, e.key, val => {
      const d = parseFloat(val);
      if (!(d > 0)) return;
      const last = pts[pts.length - 1];
      if (tool === "circle") {
        snapshotless_addCircle(last, d);
      } else {
        const dx = cursorW.x - last.x, dy = cursorW.y - last.y, L = Math.hypot(dx, dy) || 1;
        const np = { x: last.x + dx / L * d, y: last.y + dy / L * d };
        if (tool === "line") { addEntity({ type: "line", x1: last.x, y1: last.y, x2: np.x, y2: np.y }); pts = [np]; }
        else { pts.push(np); }
        redraw();
      }
    }, true);
  }
});
function snapshotless_addCircle(c, r) {
  addEntity({ type: "circle", cx: c.x, cy: c.y, r });
  pts = [];
}
window.addEventListener("keyup", e => {
  if (e.key === " ") { spaceHeld = false; cv.style.cursor = "crosshair"; }

// 浮動輸入框
function floatInput(sx, sy, val, cb, isNum) {
  const i = $("floatIn");
  i.style.display = "block";
  i.style.left = Math.min(sx, cv._w - 160) + "px";
  i.style.top = Math.max(4, sy) + "px";
  i.value = val;
  setTimeout(() => { i.focus(); if (!isNum) i.select(); else i.setSelectionRange(i.value.length, i.value.length); }, 0);
  i.onkeydown = ev => {
    ev.stopPropagation();
    if (ev.key === "Enter") { const v = i.value; hideFloat(); cb(v); }
    if (ev.key === "Escape") hideFloat();
  };
}
function hideFloat() { const i = $("floatIn"); i.style.display = "none"; i.onkeydown = null; }

// ─── 選取操作 ───────────────────────────────────────────
function deleteSel() {
  if (!selection.size) { toast("未選取任何物件"); return; }
  snapshot();
  doc.entities = doc.entities.filter(e => !selection.has(e.id));
  selection.clear(); bumpRev(); updateSelInfo(); redraw(true); autosave();
}
function duplicateSel() {
  if (!selection.size) { toast("未選取任何物件"); return; }
  snapshot();
  const st = gridStep().minor;
  const copies = [];
  for (const e of doc.entities) if (selection.has(e.id)) {
    const c = JSON.parse(JSON.stringify(e)); c.id = uid();
    translateEntity(c, st, -st);
    copies.push(c);
  }
  doc.entities.push(...copies);
  selection = new Set(copies.map(c => c.id));
  bumpRev(); updateSelInfo(); redraw(true); autosave();
}
function updateSelInfo() {
  const n = selection.size;
  if (!n) { $("selInfo").textContent = "未選取"; return; }
  const sel = doc.entities.filter(e => selection.has(e.id));
  let html = `已選取 ${n} 個物件`;
  if (n === 1) {
    const e = sel[0];
    const names = { line: "線段", rect: "矩形", circle: "圓", arc: "圓弧", poly: "折線", text: "文字", dim: "標註" };
    html += `<br>${names[e.type]}(圖層 ${e.layer})`;
    if (e.type === "line") html += `<br>長度 ${fmt(Math.hypot(e.x2 - e.x1, e.y2 - e.y1))} mm`;
    if (e.type === "rect") html += `<br>${fmt(e.w)} × ${fmt(e.h)} mm`;
    if (e.type === "circle") html += `<br>半徑 ${fmt(e.r)} mm`;
    if (e.type === "text") html += `<br>「${e.str}」`;
  }
  $("selInfo").innerHTML = html;
}

// ─── 圖層 ───────────────────────────────────────────────
function renderLayers() {
  const el = $("layerList"); el.innerHTML = "";
  for (const l of doc.layers) {
    const row = document.createElement("div");
    row.className = "layerRow" + (l.name === currentLayer ? " current" : "");
    const eye = document.createElement("span"); eye.className = "icon" + (l.visible ? "" : " off"); eye.textContent = "👁"; eye.title = "顯示/隱藏";
    eye.onclick = ev => { ev.stopPropagation(); l.visible = !l.visible; bumpRev(); renderLayers(); redraw(true); autosave(); };
    const lock = document.createElement("span"); lock.className = "icon" + (l.locked ? "" : " off"); lock.textContent = "🔒"; lock.title = "鎖定";
    lock.onclick = ev => { ev.stopPropagation(); l.locked = !l.locked; bumpRev(); renderLayers(); autosave(); };
    const col = document.createElement("input"); col.type = "color"; col.value = l.color;
    col.onclick = ev => ev.stopPropagation();
    col.oninput = () => { l.color = col.value; bumpRev(); redraw(true); autosave(); };
    const nm = document.createElement("span"); nm.className = "lname"; nm.textContent = l.name; nm.title = l.name;
    const del = document.createElement("span"); del.className = "icon"; del.textContent = "✕"; del.title = "刪除圖層";
    del.onclick = ev => {
      ev.stopPropagation();
      if (doc.layers.length <= 1) { toast("至少要保留一個圖層"); return; }
      if (doc.entities.some(e => e.layer === l.name)) { toast("圖層内還有物件,無法刪除"); return; }
      snapshot();
      doc.layers = doc.layers.filter(x => x !== l);
      if (currentLayer === l.name) currentLayer = doc.layers[0].name;
      bumpRev(); renderLayers(); redraw(true); autosave();
    };
    row.onclick = () => { currentLayer = l.name; renderLayers(); };
    row.append(eye, lock, col, nm, del);
    el.appendChild(row);
  }
}
$("btnAddLayer").onclick = () => {
  const name = prompt("圖層名稱:", "圖層" + doc.layers.length);
  if (!name) return;
  if (doc.layers.some(l => l.name === name)) { toast("圖層名稱重複"); return; }
  snapshot();
  const palette = ["#f2d024", "#4da3ff", "#7fdc7f", "#e06060", "#c792ea", "#6ee7d8"];
  doc.layers.push({ name, color: palette[(doc.layers.length - 1) % palette.length], visible: true, locked: false });
  currentLayer = name;
  bumpRev(); renderLayers(); autosave();
};

// ─── 視圖 ───────────────────────────────────────────────
function zoomExtents() {
  const b = extents();
  if (!b) { view.scale = 1; view.tx = 60; view.ty = cv._h - 60; redraw(true); return; }
  const mw = b.maxx - b.minx || 100, mh = b.maxy - b.miny || 100;
  view.scale = Math.min((cv._w - 100) / mw, (cv._h - 100) / mh);
  view.scale = Math.min(1e4, Math.max(1e-5, view.scale));
  view.tx = cv._w / 2 - (b.minx + mw / 2) * view.scale;
  view.ty = cv._h / 2 + (b.miny + mh / 2) * view.scale;
  redraw(true);
}

// ─── 檔案 ───────────────────────────────────────────────
function download(name, content, mime) {
  const blob = content instanceof Blob ? content : new Blob([content], { type: mime || "text/plain;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 500);
}
function stamp() {
  const d = new Date();

  return `${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;
}
function saveFile() {
  download(`圖面-${stamp()}.json`, JSON.stringify(doc, null, 1), "application/json");
  toast("已下載專案檔(.json)");
}
function maxId(list) { // 不可用 Math.max(...list):數十萬個參數會堆疊溢位
  let m = 0;
  for (const e of list) if (e.id > m) m = e.id;
  return m;
}
function applyLoadedDoc(o, label) {
  try {
    snapshot();
    doc = o;
    doc.settings = doc.settings || { textH: 3.5, dimH: 3.5 };
    currentLayer = doc.layers[0].name;
    idSeq = maxId(doc.entities) + 1;
    selection.clear(); bumpRev(); syncSettingsUI(); renderLayers(); zoomExtents(); autosave();
    toast("已開啟:" + label + "(" + doc.entities.length + " 個圖元)", 4500);
  } catch (err) {
    console.error(err);
    toast("開啟時發生錯誤:" + (err && err.message ? err.message : err), 6000);
  }
}
// ─── DWG 直接開啟(GNU LibreDWG WebAssembly,需 http/https 環境) ───
let ldwgLib = null;
function loadScript(url) {
  return new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = url; s.onload = res; s.onerror = () => rej(new Error("下載失敗:" + url));
    document.head.appendChild(s);
  });
}
async function openDwgFile(file) {
  if (location.protocol === "file:") {
    toast("本機直接雙擊模式無法開 DWG。請改用網頁版(GitHub Pages 網址),或把 DWG 拖到「把DWG拖到這裡轉檔.bat」", 9000);
    return;
  }
  if (file.size > 60 * 1024 * 1024) { toast("DWG 超過 60MB,瀏覽器吃不下,請在電腦轉檔", 7000); return; }
  try {
    if (!ldwgLib) {
      toast("首次載入 DWG 解析引擎(約 9MB)…", 6000);
      const m = await import("./libredwg/libredwg-web.js");
      window.createModule = m.default;
      await loadScript("libredwg/libredwg-web-wrapper.js");
      ldwgLib = await window["libredwg-web"].LibreDwg.create("libredwg");
    }
    toast("DWG 解析中…(大檔要幾十秒,畫面凍結是正常的)", 8000);
    await new Promise(r => setTimeout(r, 80)); // 讓 toast 先畫出來
    const pkg = window["libredwg-web"];
    const buf = await file.arrayBuffer();
    const dwg = ldwgLib.dwg_read_data(buf, pkg.Dwg_File_Type.DWG);
    if (!dwg) throw new Error("無法解讀(檔案損壞或版本不支援)");
    const db = ldwgLib.convert(dwg);
    try { ldwgLib.dwg_free(dwg); } catch { }
    const res = dwgDbToDoc(db);
    if (!res.doc.entities.length) throw new Error("讀到 0 個圖元(版本可能不支援)");
    applyLoadedDoc(res.doc, file.name + (res.skipped ? `,略過 ${res.skipped} 個不支援物件` : ""));
  } catch (err) {
    console.error(err);
    toast("DWG 解析失敗:" + (err && err.message ? err.message : err) + " — 可請對方改存 DXF 再傳", 9000);
  }
}
function openFile(file) {
  const rd = new FileReader();

  if (/\.dxf$/i.test(file.name || "")) { // DXF 直接開(手機免轉檔)
    if (file.size > 120 * 1024 * 1024) { toast("DXF 超過 120MB,瀏覽器吃不下 — 請在電腦用拖曳轉檔做成 .json", 7000); return; }
    toast("解析 DXF 中…(大檔要幾十秒)", 8000);
    rd.onload = () => {
      setTimeout(() => { // 讓 toast 先畫出來

        const src = (e.fitPoints && e.fitPoints.length >= 2) ? e.fitPoints : (e.controlPoints || []);

        if (pts2.length >= 2) emit({ type: "poly", pts: pts2, closed: !!(e.flag & 1) }, ly);
        break;
      }
      case "SOLID": {
        const cs = [e.corner1, e.corner2, e.corner4 || e.corner3, e.corner3].filter(Boolean);
        if (cs.length >= 3) emit({ type: "poly", pts: cs.map(p => P(M, p)), closed: true }, ly);
        break;
      }
      case "INSERT": case "DIMENSION": {
        if (depth >= 8) { skipped++; break; }
        const blk = blocks.get(e.name);
        if (!blk) { skipped++; break; }
        let Mi = M0;
        if (e.type === "INSERT") {
          const base = blk.basePoint || { x: 0, y: 0 };
          const sx = e.xScale || 1, sy = e.yScale || 1, rot = e.rotation || 0; // 弧度
          const co = Math.cos(rot), si = Math.sin(rot);
          const RS = [co * sx, si * sx, -si * sy, co * sy];
          Mi = [RS[0], RS[1], RS[2], RS[3],
            e.insertionPoint.x - (RS[0] * base.x + RS[2] * base.y),
            e.insertionPoint.y - (RS[1] * base.x + RS[3] * base.y)];
        }
        const Mt = mmul(M, Mi);
        const cc = Math.max(1, e.columnCount || 1), rc = Math.max(1, e.rowCount || 1);
        for (let ci = 0; ci < cc; ci++) for (let ri = 0; ri < rc; ri++) {
          const Mo = (ci || ri) ? mmul(Mt, [1, 0, 0, 1, ci * (e.columnSpacing || 0), ri * (e.rowSpacing || 0)]) : Mt;
          for (const ce of (blk.entities || [])) convEnt(ce, Mo, ly, depth + 1);
        }
        for (const at of (e.attribs || [])) convEnt(at, M, ly, depth + 1);
        break;
      }
      default: skipped++;
    }
  }

  const ms = blocks.get("*Model_Space");
  const rootEnts = (ms && ms.entities && ms.entities.length ? ms.entities : db.entities) || [];
  for (const e of rootEnts) convEnt(e, M0, null, 0);

  // 圖層表(顏色可能是 24-bit 或 ACI 索引)
  const layerRows = [];
  for (const l of ((db.tables && db.tables.LAYER && db.tables.LAYER.entries) || [])) {
    let col = "#e8e8e8";
    if (l.color && l.color > 0 && l.color <= 0xffffff && l.color !== 16777215) col = "#" + l.color.toString(16).padStart(6, "0");
    else if (l.colorIndex && l.colorIndex > 0 && l.colorIndex < 256) col = aciHex2(l.colorIndex);
    layerRows.push({ name: l.name, color: col, visible: !l.off && !(l.standardFlag & 1), locked: false });
  }
  const layMap = new Map(layerRows.map(l => [l.name, l]));
  for (const e of out) if (!layMap.has(e.layer)) {
    const l = { name: e.layer, color: "#e8e8e8", visible: true, locked: false };
    layMap.set(e.layer, l); layerRows.push(l);
  }
  if (!layerRows.length) layerRows.push({ name: "0", color: "#e8e8e8", visible: true, locked: false });
  if (out.length >= MAXE) toast(`圖太大,已達 ${MAXE} 圖元上限,後面的被截掉`, 7000);
  return {
    doc: { version: 1, units: "mm", layers: layerRows, entities: out, settings: { textH: 3.5, dimH: 3.5 } },
    skipped,
  };
}

// ─── SVG 匯出(檔案與列印共用) ─────────────────────────
function arcToPolyPts(e) {

    const a = e.a1 + sweep * i / n;

      const closed = e.type === "rect" || e.closed;
      const d = src.map(q => P(q[0], q[1]).join(",")).join(" ");
      return `<${closed ? "polygon" : "polyline"} points="${d}" ${attr}/>`;
    }
    case "circle": { const c = P(e.cx, e.cy); return `<circle cx="${c[0]}" cy="${c[1]}" r="${e.r}" ${attr}/>`; }
    case "arc": {
      const d = arcToPolyPts(e).map(q => P(q[0], q[1]).join(",")).join(" ");

    case "text": {

    }
  }

}
function printLayout(o) { // 列印版面計算(SVG 與點陣預覽共用)
  const b = extents();

  const pad = Math.max((b.maxx - b.minx), (b.maxy - b.miny)) * 0.03 + 2;
  const dw = (b.maxx - b.minx) + pad * 2, dh = (b.maxy - b.miny) + pad * 2;

function svgString(opts) {

  const pad = Math.max((b.maxx - b.minx), (b.maxy - b.miny)) * 0.03 + 2;
  const dw = (b.maxx - b.minx) + pad * 2, dh = (b.maxy - b.miny) + pad * 2;

        `<line x1="${fmt(tx1)}" y1="${fmt(ty1 + fh / 2)}" x2="${fmt(tx1 + fw)}" y2="${fmt(ty1 + fh / 2)}" stroke="#000" stroke-width="${sw * 0.7}"/>` +
        `<text x="${fmt(tx1 + 2 * scaleN)}" y="${fmt(ty1 + fh * 0.38)}" font-size="${fmt(fs)}" font-family="Microsoft JhengHei,sans-serif">圖名:${esc(o.name || "")}</text>` +
        `<text x="${fmt(tx1 + 2 * scaleN)}" y="${fmt(ty1 + fh * 0.88)}" font-size="${fmt(fs)}" font-family="Microsoft JhengHei,sans-serif">比例 ${o.scaleN ? "1:" + o.scaleN : "符合頁面"}  單位 mm  ${o.date || ""}</text></g>`;
    }

function printColor(c) { // 淺色圖層印在白紙上改深色

// ─── DXF R12 匯出 ───────────────────────────────────────
function aciColor(hex) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  const basic = [[255, 0, 0, 1], [255, 255, 0, 2], [0, 255, 0, 3], [0, 255, 255, 4], [0, 0, 255, 5], [255, 0, 255, 6], [255, 255, 255, 7]];
  let best = 7, bd = Infinity;
  for (const [br, bg, bb, i] of basic) {
    const d = (r - br) ** 2 + (g - bg) ** 2 + (b - bb) ** 2;
    if (d < bd) { bd = d; best = i; }
  }

}
function dxfEsc(s) { // R12 無法存 UTF-8:非 ASCII 轉 AutoCAD \U+XXXX 跳脫(ezdxf.decode_dxf_unicode 可還原)
  return String(s).replace(/[^\x20-\x7E]/g, ch => "\\U+" + ch.charCodeAt(0).toString(16).toUpperCase().padStart(4, "0"));

function dxfString() {
  const L = [];
  const G = (c, v) => { L.push(String(c), String(v)); };
  const deg = a => (norm2pi(a) * 180 / Math.PI);
  G(0, "SECTION"); G(2, "HEADER");
  G(9, "$ACADVER"); G(1, "AC1009");
  G(9, "$INSUNITS"); G(70, 4); // mm
  G(0, "ENDSEC");
  G(0, "SECTION"); G(2, "TABLES");
  G(0, "TABLE"); G(2, "LAYER"); G(70, doc.layers.length);
  for (const l of doc.layers) {
    G(0, "LAYER"); G(2, dxfEsc(l.name)); G(70, 0); G(62, aciColor(l.color)); G(6, "CONTINUOUS");
  }
  G(0, "ENDTAB"); G(0, "ENDSEC");
  G(0, "SECTION"); G(2, "ENTITIES");
  const line = (x1, y1, x2, y2, ly) => { G(0, "LINE"); G(8, ly); G(10, fmt(x1)); G(20, fmt(y1)); G(11, fmt(x2)); G(21, fmt(y2)); };
  const text = (x, y, h, str, ly, ang) => {
    G(0, "TEXT"); G(8, ly); G(10, fmt(x)); G(20, fmt(y)); G(40, fmt(h)); G(1, dxfEsc(str));
    if (ang) G(50, fmt(ang));
  };
  for (const e of doc.entities) {
    const ly = dxfEsc(e.layer);
    switch (e.type) {
      case "line": line(e.x1, e.y1, e.x2, e.y2, ly); break;
      case "circle": G(0, "CIRCLE"); G(8, ly); G(10, fmt(e.cx)); G(20, fmt(e.cy)); G(40, fmt(e.r)); break;
      case "arc": G(0, "ARC"); G(8, ly); G(10, fmt(e.cx)); G(20, fmt(e.cy)); G(40, fmt(e.r)); G(50, fmt(deg(e.a1))); G(51, fmt(deg(e.a2))); break;
      case "rect": case "poly": {
        const src = e.type === "rect"
          ? [[e.x, e.y], [e.x + e.w, e.y], [e.x + e.w, e.y + e.h], [e.x, e.y + e.h]]
          : e.pts;
        const closed = e.type === "rect" || e.closed;
        G(0, "POLYLINE"); G(8, ly); G(66, 1); G(70, closed ? 1 : 0);
        for (const q of src) { G(0, "VERTEX"); G(8, ly); G(10, fmt(q[0])); G(20, fmt(q[1])); }
        G(0, "SEQEND");
        break;
      }
      case "text": text(e.x, e.y, e.h, e.str, ly); break;
      case "dim": { // 分解為線+箭頭(線)+文字
        const g = dimPrimitives(e);

        for (const t of g.tris) {
          line(t[0].x, t[0].y, t[1].x, t[1].y, ly);
          line(t[1].x, t[1].y, t[2].x, t[2].y, ly);
          line(t[2].x, t[2].y, t[0].x, t[0].y, ly);
        }
        const halfW = g.text.str.length * g.text.h * 0.35;
        text(g.text.x - halfW * Math.cos(g.text.ang), g.text.y - halfW * Math.sin(g.text.ang),
          g.text.h, g.text.str, ly, g.text.ang * 180 / Math.PI);
        break;
      }
    }
  }
  G(0, "ENDSEC"); G(0, "EOF");
  return L.join("\r\n") + "\r\n";
}

// ─── PNG 匯出 ───────────────────────────────────────────
function exportPng() {
  const b = extents();
  if (!b) { toast("沒有圖形可匯出"); return; }
  const pad = Math.max(b.maxx - b.minx, b.maxy - b.miny) * 0.04 + 2;
  const dw = b.maxx - b.minx + pad * 2, dh = b.maxy - b.miny + pad * 2;
  const long = 2400;
  const sc = long / Math.max(dw, dh);
  const c2 = document.createElement("canvas");
  c2.width = Math.round(dw * sc); c2.height = Math.round(dh * sc);
  const cx2 = c2.getContext("2d");
  cx2.fillStyle = "#ffffff"; cx2.fillRect(0, 0, c2.width, c2.height);
  const vw = { scale: sc, tx: -(b.minx - pad) * sc, ty: (b.maxy + pad) * sc };
  cx2.lineWidth = Math.max(1.2, sc * 0.35);
  for (const e of visibleEntities()) {
    const col = printColor(layerOf(e).color);
    cx2.strokeStyle = col; cx2.fillStyle = col;
    strokeEntity(cx2, e, vw);
  }
  c2.toBlob(bl => download(`圖面-${stamp()}.png`, bl), "image/png");
  toast("已下載 PNG");
}

// ─── 列印 / PDF ─────────────────────────────────────────
const PAPERS = { A4: [210, 297], A3: [297, 420] };
function printOpts() {
  const [pw, ph] = PAPERS[$("pPaper").value];
  const land = $("pOrient").value === "landscape";
  const sv = $("pScale").value;
  const d = new Date();
  return {
    forPrint: true,
    paperW: land ? Math.max(pw, ph) : Math.min(pw, ph),
    paperH: land ? Math.min(pw, ph) : Math.max(pw, ph),
    margin: 10,
    scaleN: sv === "fit" ? null : parseFloat(sv),
    title: $("pTitle").checked,
    name: $("pName").value,
    date: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`,
  };
}
const RASTER_PREVIEW_LIMIT = 30000; // 圖元超過此數,預覽改用點陣圖(向量預覽會凍結十幾秒)
function rasterPreview(o) {
  const L = printLayout(o);
  if (!L) return null;
  const wrap = $("previewWrap");
  const k = Math.min((wrap.clientWidth - 24) / o.paperW, (wrap.clientHeight - 24) / o.paperH, 3);
  const res = Math.min(2, 1600 / Math.max(o.paperW, o.paperH)) * 2; // 畫布解析度(px / 紙mm)
  const c = document.createElement("canvas");
  c.width = Math.round(o.paperW * res); c.height = Math.round(o.paperH * res);
  c.style.width = (o.paperW * k) + "px"; c.style.height = (o.paperH * k) + "px";
  c.style.background = "#fff"; c.style.boxShadow = "0 2px 14px #0008";
  c.title = "預覽為簡化點陣圖;實際列印輸出仍是向量(含標題欄)";
  const x = c.getContext("2d");
  x.fillStyle = "#fff"; x.fillRect(0, 0, c.width, c.height);
  const vs = res / L.scaleN; // px / 世界mm
  const vw = { scale: vs, tx: -L.vbX * vs, ty: (L.vbY + L.vbH) * vs };
  x.lineWidth = Math.max(0.6, 0.35 * res);
  for (const e of visibleEntities()) {
    const col = printColor(layerOf(e).color);
    x.strokeStyle = col; x.fillStyle = col;
    strokeEntity(x, e, vw);
  }
  return c;
}
function refreshPreview() {
  const o = printOpts();
  const wrap = $("previewWrap");
  if (!visibleEntities().length) { wrap.innerHTML = "<div style='color:#ddd'>沒有圖形</div>"; return; }
  wrap.innerHTML = "<div style='color:#ddd'>產生預覽中…</div>";
  clearTimeout(refreshPreview._tm);
  refreshPreview._tm = setTimeout(() => {
    if (visibleEntities().length > RASTER_PREVIEW_LIMIT) {
      const c = rasterPreview(o);
      wrap.innerHTML = "";
      if (c) wrap.appendChild(c);
      return;
    }
    const s = svgString(o);
    if (!s) { wrap.innerHTML = "<div style='color:#ddd'>沒有圖形</div>"; return; }
    wrap.innerHTML = s;
    const svg = wrap.firstElementChild;
    // 預覽縮小顯示
    const maxW = wrap.clientWidth - 24, maxH = wrap.clientHeight - 24;
    const k = Math.min(maxW / o.paperW, maxH / o.paperH, 3);
    svg.setAttribute("width", (o.paperW * k) + "px");
    svg.setAttribute("height", (o.paperH * k) + "px");
  }, 40);
}

  if (!doc.entities.length) { toast("沒有圖形可匯出"); return; }
  download(`圖面-${stamp()}.dxf`, dxfString(), "application/dxf");
  toast("已下載 DXF(R12,可用 AutoCAD/ezdxf 開啟)");
};
$("btnDel").onclick = deleteSel;
$("btnDup").onclick = duplicateSel;
document.querySelectorAll("#toolbox [data-tool]").forEach(b => b.onclick = () => setTool(b.dataset.tool));

// 設定
function syncSettingsUI() {
  $("inTextH").value = doc.settings.textH;
  $("inDimH").value = doc.settings.dimH;
}
$("inTextH").oninput = () => { const v = parseFloat($("inTextH").value); if (v > 0) { doc.settings.textH = v; autosave(); } };
$("inDimH").oninput = () => { const v = parseFloat($("inDimH").value); if (v > 0) { doc.settings.dimH = v; bbCache = new WeakMap(); bumpRev(); redraw(true); autosave(); } };
$("btnAutoH").onclick = () => {
  const b = extents();
  if (!b) { toast("圖面是空的"); return; }
  const h = Math.max(2.5, parseFloat(((Math.max(b.maxx - b.minx, b.maxy - b.miny)) / 70).toFixed(1)));
  doc.settings.textH = h; doc.settings.dimH = h;
  syncSettingsUI(); redraw(true); autosave();
  toast(`字高已設為 ${h} mm`);
};
["chkGrid", "chkSnapGrid", "chkOsnap", "chkOrtho"].forEach(id => $(id).onchange = () => redraw(true));

// ─── 啟動 ───────────────────────────────────────────────
window.addEventListener("resize", resizeCanvas);
const restored = loadAutosave();
syncSettingsUI();
renderLayers();
resizeCanvas();
if (restored) { zoomExtents(); toast("已還原上次的圖面(自動儲存)"); }
setTool("select");

// 測試/自動化掛鉤(也方便未來擴充)
window.CAD = {
  get doc() { return doc; }, get view() { return view; }, get selection() { return selection; },
  addEntity, redraw, undo, redo, setTool, zoomExtents, extents,
  svgString, dxfString, dimPrimitives, hitTest, s2w, w2s, strokeEntity,
  setDoc(o) { doc = o; currentLayer = doc.layers[0].name; bumpRev(); renderLayers(); redraw(true); },
};
</script>
</body>
</html>
